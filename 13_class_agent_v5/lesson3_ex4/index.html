<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONSTELLATION</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #000000;
      --color-accent: #c8d8ff;
      --color-text: #ffffff;
      --font-title: 'Orbitron', monospace;
      --font-body: 'Rajdhani', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--color-bg);
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--color-text);
      cursor: none;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    .title {
      font-family: var(--font-title);
      font-size: clamp(1.8rem, 7vw, 5.5rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      color: #ffffff;
      text-shadow:
        0 0 20px rgba(200, 216, 255, 0.9),
        0 0 50px rgba(200, 216, 255, 0.5),
        0 0 100px rgba(200, 216, 255, 0.2);
      margin-bottom: 1.2rem;
      text-align: center;
    }

    .subtitle {
      font-family: var(--font-body);
      font-size: clamp(0.7rem, 1.8vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      color: rgba(200, 216, 255, 0.6);
      text-transform: uppercase;
      text-align: center;
    }

    .hint {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-body);
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: rgba(255, 255, 255, 0.25);
      z-index: 10;
      pointer-events: none;
      text-transform: uppercase;
      animation: breathe 2.5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.6; }
    }

    .cursor {
      position: fixed;
      width: 6px;
      height: 6px;
      background: rgba(200, 216, 255, 0.9);
      border-radius: 50%;
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px rgba(200, 216, 255, 0.8);
      transition: transform 0.1s ease;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="overlay">
    <h1 class="title">CONSTELLATION</h1>
    <p class="subtitle">Canvas 2D Interactive Particles</p>
  </div>

  <div class="hint">Move your mouse</div>
  <div class="cursor" id="cursor"></div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const cursorEl = document.getElementById('cursor');

    let width, height;
    let mouse = { x: -2000, y: -2000 };
    let targetMouse = { x: -2000, y: -2000 };

    const PARTICLE_COUNT = 60;
    const CONNECTION_DIST = 150;
    const REPEL_DIST = 100;
    const REPEL_FORCE = 0.6;

    let particles = [];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() {
        this.init();
      }

      init() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.ox = this.x;
        this.oy = this.y;
        this.vx = (Math.random() - 0.5) * 0.35;
        this.vy = (Math.random() - 0.5) * 0.35;
        this.radius = Math.random() * 1.5 + 0.8;
        this.baseOpacity = Math.random() * 0.4 + 0.5;
        this.opacity = this.baseOpacity;
        this.twinkleSpeed = Math.random() * 0.025 + 0.008;
        this.twinklePhase = Math.random() * Math.PI * 2;
      }

      update() {
        this.twinklePhase += this.twinkleSpeed;
        this.opacity = this.baseOpacity * (0.75 + 0.25 * Math.sin(this.twinklePhase));

        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < REPEL_DIST && dist > 0) {
          const force = (REPEL_DIST - dist) / REPEL_DIST * REPEL_FORCE;
          this.vx += (dx / dist) * force;
          this.vy += (dy / dist) * force;
        }

        this.vx *= 0.97;
        this.vy *= 0.97;
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < -10) this.x = width + 10;
        if (this.x > width + 10) this.x = -10;
        if (this.y < -10) this.y = height + 10;
        if (this.y > height + 10) this.y = -10;
      }

      draw() {
        const r = this.radius;
        const a = this.opacity;

        const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 4);
        glow.addColorStop(0, `rgba(255, 255, 255, ${a})`);
        glow.addColorStop(0.4, `rgba(200, 216, 255, ${a * 0.4})`);
        glow.addColorStop(1, `rgba(180, 210, 255, 0)`);

        ctx.beginPath();
        ctx.arc(this.x, this.y, r * 4, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${a})`;
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(new Particle());
      }
    }

    function drawConnections() {
      const near = [];

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < CONNECTION_DIST) {
          near.push({ p, d });
        }
      }

      for (let i = 0; i < near.length; i++) {
        for (let j = i + 1; j < near.length; j++) {
          const p1 = near[i].p;
          const p2 = near[j].p;
          const dx = p1.x - p2.x;
          const dy = p1.y - p2.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < CONNECTION_DIST) {
            const f1 = 1 - near[i].d / CONNECTION_DIST;
            const f2 = 1 - near[j].d / CONNECTION_DIST;
            const fp = 1 - dist / CONNECTION_DIST;
            const alpha = f1 * f2 * fp * 0.85;

            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(200, 216, 255, ${alpha})`;
            ctx.lineWidth = alpha * 1.2 + 0.3;
            ctx.stroke();
          }
        }
      }

      for (let i = 0; i < near.length; i++) {
        const { p, d } = near[i];
        const alpha = (1 - d / CONNECTION_DIST) * 0.35;

        ctx.beginPath();
        ctx.moveTo(mouse.x, mouse.y);
        ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = `rgba(180, 205, 255, ${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }

    function drawMousGlow() {
      if (mouse.x < 0) return;
      const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 80);
      g.addColorStop(0, 'rgba(200, 216, 255, 0.06)');
      g.addColorStop(1, 'rgba(200, 216, 255, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, 80, 0, Math.PI * 2);
      ctx.fill();
    }

    function animate() {
      mouse.x += (targetMouse.x - mouse.x) * 0.12;
      mouse.y += (targetMouse.y - mouse.y) * 0.12;

      ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
      ctx.fillRect(0, 0, width, height);

      drawMousGlow();
      drawConnections();

      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      resize();
      initParticles();
    });

    window.addEventListener('mousemove', e => {
      targetMouse.x = e.clientX;
      targetMouse.y = e.clientY;
      cursorEl.style.left = e.clientX + 'px';
      cursorEl.style.top = e.clientY + 'px';
    });

    window.addEventListener('mouseleave', () => {
      targetMouse.x = -2000;
      targetMouse.y = -2000;
    });

    window.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      targetMouse.x = t.clientX;
      targetMouse.y = t.clientY;
    }, { passive: false });

    window.addEventListener('touchend', () => {
      targetMouse.x = -2000;
      targetMouse.y = -2000;
    });

    resize();
    initParticles();
    animate();
  </script>
</body>
</html>
