<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Section</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #fffeff;
      --color-accent: #92262a;
      --color-text: #111111;
      --font-title: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      --font-body: 'Space Mono', 'Noto Sans KR', monospace;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--color-bg);
      color: var(--color-text);
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* gradient background */
    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(146, 38, 42, 0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(146, 38, 42, 0.08) 0%, transparent 70%),
        linear-gradient(135deg, #fffeff 0%, #f7eced 50%, #fff5f5 100%);
      z-index: 0;
    }

    /* decorative blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      z-index: 1;
      will-change: transform;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: var(--color-accent);
      top: -100px; left: -150px;
      animation: float1 12s ease-in-out infinite;
    }
    .blob-2 {
      width: 350px; height: 350px;
      background: #c0507a;
      bottom: -80px; right: -80px;
      animation: float2 10s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(40px, 30px) scale(1.05); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(-30px, -20px) scale(1.08); }
    }

    /* content */
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 2rem;
      max-width: 860px;
      width: 100%;
    }

    .hero-tag {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-accent);
      border: 1px solid var(--color-accent);
      padding: 6px 18px;
      border-radius: 999px;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s ease forwards;
    }

    .hero-name {
      font-family: var(--font-title);
      font-size: clamp(4rem, 12vw, 9rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      color: var(--color-text);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.4s ease forwards;
    }

    .hero-name span {
      color: var(--color-accent);
    }

    .hero-role {
      font-family: var(--font-body);
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--color-accent);
      min-height: 2em;
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.6s ease forwards;
    }

    .hero-role .typed-cursor {
      color: var(--color-accent);
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .hero-desc {
      font-family: var(--font-body);
      font-size: clamp(0.85rem, 1.8vw, 1rem);
      line-height: 1.8;
      color: #555555;
      max-width: 520px;
      margin: 0 auto 2.8rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.8s ease forwards;
    }

    .hero-btns {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.7s 1s ease forwards;
    }

    .btn {
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 14px 36px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: var(--color-accent);
      color: #ffffff;
      border: 2px solid var(--color-accent);
    }
    .btn-primary:hover {
      background: transparent;
      color: var(--color-accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(146, 38, 42, 0.25);
    }

    .btn-secondary {
      background: transparent;
      color: var(--color-text);
      border: 2px solid #cccccc;
    }
    .btn-secondary:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
      transform: translateY(-2px);
    }

    /* ===== SCROLL HINT ===== */
    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      animation: fadeIn 1s 1.4s ease forwards;
      cursor: default;
    }

    .scroll-hint span {
      font-family: var(--font-body);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaaaaa;
    }

    .scroll-mouse {
      width: 22px;
      height: 36px;
      border: 2px solid #bbbbbb;
      border-radius: 12px;
      position: relative;
      display: flex;
      justify-content: center;
    }

    .scroll-wheel {
      width: 4px;
      height: 8px;
      background: var(--color-accent);
      border-radius: 2px;
      margin-top: 5px;
      animation: scrollWheel 1.8s ease-in-out infinite;
      will-change: transform, opacity;
    }

    @keyframes scrollWheel {
      0%   { transform: translateY(0);   opacity: 1; }
      60%  { transform: translateY(12px); opacity: 0; }
      61%  { transform: translateY(0);   opacity: 0; }
      100% { transform: translateY(0);   opacity: 1; }
    }

    /* ===== KEYFRAMES ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .hero-name { letter-spacing: 0.02em; }
      .hero-btns { flex-direction: column; align-items: center; }
      .btn { width: 200px; text-align: center; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="hero-content">
      <div class="hero-tag">Portfolio 2026</div>

      <h1 class="hero-name">Kim <span>Minwoo</span></h1>

      <p class="hero-role" id="typed-target"></p>

      <p class="hero-desc">
        사용자 경험을 섬세하게 설계하는 크리에이티브 개발자입니다.<br />
        코드로 아이디어를 현실로 만드는 일을 즐깁니다.
      </p>

      <div class="hero-btns">
        <a href="#" class="btn btn-primary">Work with me</a>
        <a href="#" class="btn btn-secondary">View Projects</a>
      </div>
    </div>

    <div class="scroll-hint">
      <div class="scroll-mouse">
        <div class="scroll-wheel"></div>
      </div>
      <span>Scroll</span>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>
  <script>
    new Typed('#typed-target', {
      strings: [
        'Front-End Developer',
        'UI / UX Designer',
        'Creative Coder',
        'Web Animator'
      ],
      typeSpeed: 60,
      backSpeed: 35,
      backDelay: 2000,
      loop: true,
      smartBackspace: true
    });
  </script>
</body>
</html>
