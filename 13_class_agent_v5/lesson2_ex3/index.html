<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@300;400;600&family=Black+Han+Sans&family=Nanum+Gothic+Coding:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-bg: #0d0d0d;
      --color-accent: #8fdf3d;
      --color-text: #ffffff;
      --font-title: 'Space Mono', 'Black Han Sans', monospace;
      --font-body: 'IBM Plex Mono', 'Nanum Gothic Coding', monospace;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      width: 100%;
      min-height: 100%;
      overflow-y: auto;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .hero {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      pointer-events: none;
    }

    .hero-tag {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 1.2rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .hero-name {
      font-family: var(--font-title);
      font-size: clamp(3rem, 9vw, 8rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1.05;
      color: var(--color-text);
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.9s ease forwards 0.4s;
    }

    .hero-name span {
      color: var(--color-accent);
    }

    .hero-role {
      font-family: var(--font-body);
      font-size: clamp(0.85rem, 2.2vw, 1.15rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
      margin-top: 1rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.9s ease forwards 0.6s;
    }

    .hero-divider {
      width: 48px;
      height: 2px;
      background: var(--color-accent);
      margin: 2rem auto;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 0.8s;
    }

    .hero-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.9s ease forwards 1s;
      pointer-events: all;
    }

    .btn {
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.85rem 2.2rem;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--color-accent);
      color: #0d0d0d;
      border: 2px solid var(--color-accent);
    }

    .btn-primary:hover {
      background: transparent;
      color: var(--color-accent);
      box-shadow: 0 0 20px rgba(143, 223, 61, 0.35);
    }

    .btn-outline {
      background: transparent;
      color: var(--color-text);
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .btn-outline:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
      box-shadow: 0 0 20px rgba(143, 223, 61, 0.15);
    }

    .scroll-hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.4s;
    }

    .scroll-hint span {
      font-family: var(--font-body);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--color-accent), transparent);
      animation: scrollPulse 1.8s ease-in-out infinite;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.8rem 3rem;
    }

    .nav-logo {
      font-family: var(--font-title);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--color-text);
    }

    .nav-logo span {
      color: var(--color-accent);
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: var(--color-accent);
    }

    .corner-info {
      position: fixed;
      bottom: 2rem;
      right: 3rem;
      z-index: 10;
      text-align: right;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.2s;
    }

    .corner-info p {
      font-family: var(--font-body);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.3);
      line-height: 1.8;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 1; transform: scaleY(1); }
      50% { opacity: 0.4; transform: scaleY(0.6); }
    }

    @media (max-width: 640px) {
      .nav { padding: 1.4rem 1.5rem; }
      .nav-links { display: none; }
      .corner-info { right: 1.5rem; }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <nav class="nav">
    <div class="nav-logo">PF<span>.</span></div>
    <ul class="nav-links">
      <li><a href="#">About</a></li>
      <li><a href="#">Work</a></li>
      <li><a href="#">Skills</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <main class="hero">
    <p class="hero-tag">Creative Developer</p>
    <h1 class="hero-name">KIM<br /><span>JIWON</span></h1>
    <p class="hero-role">Frontend &amp; Interactive Experience</p>
    <div class="hero-divider"></div>
    <div class="hero-buttons">
      <a href="#" class="btn btn-primary">View Work</a>
      <a href="#" class="btn btn-outline">Contact Me</a>
    </div>
  </main>

  <div class="scroll-hint">
    <div class="scroll-line"></div>
    <span>Scroll</span>
  </div>

  <div class="corner-info">
    <p>Seoul, Korea</p>
    <p>Available for Hire</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
  <script>
    (function () {
      const canvas = document.getElementById('bg-canvas');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x0d0d0d, 1);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.z = 5;

      const geometry = new THREE.SphereGeometry(2, 36, 36);
      const material = new THREE.MeshBasicMaterial({
        color: 0x8fdf3d,
        wireframe: true,
        transparent: true,
        opacity: 0.55,
      });
      const sphere = new THREE.Mesh(geometry, material);
      scene.add(sphere);

      const outerGeo = new THREE.SphereGeometry(2.35, 18, 18);
      const outerMat = new THREE.MeshBasicMaterial({
        color: 0x8fdf3d,
        wireframe: true,
        transparent: true,
        opacity: 0.12,
      });
      const outerSphere = new THREE.Mesh(outerGeo, outerMat);
      scene.add(outerSphere);

      const pointLight = new THREE.PointLight(0x8fdf3d, 2, 10);
      pointLight.position.set(3, 3, 3);
      scene.add(pointLight);

      let mouseX = 0;
      let mouseY = 0;
      let targetRotX = 0;
      let targetRotY = 0;
      let currentRotX = 0;
      let currentRotY = 0;

      document.addEventListener('mousemove', function (e) {
        mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
        mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
      });

      let autoRotY = 0;
      let raf;

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function animate() {
        raf = requestAnimationFrame(animate);

        autoRotY += 0.003;

        targetRotX = mouseY * 0.6;
        targetRotY = mouseX * 0.6;

        currentRotX = lerp(currentRotX, targetRotX, 0.05);
        currentRotY = lerp(currentRotY, targetRotY, 0.05);

        sphere.rotation.x = currentRotX;
        sphere.rotation.y = autoRotY + currentRotY;
        sphere.rotation.z = currentRotX * 0.3;

        outerSphere.rotation.x = -currentRotX * 0.4;
        outerSphere.rotation.y = -autoRotY * 0.6 + currentRotY * 0.4;

        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener('resize', function () {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    })();
  </script>
</body>
</html>
