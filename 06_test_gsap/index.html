<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VISUAL WORKS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: auto;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Space Mono', monospace;
      overflow-x: hidden;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 40px;
    }

    header span {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: #fff;
      opacity: 0.6;
      letter-spacing: 0.15em;
    }

    /* Section 1 - Hero */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: #0d0d0d;
    }

    .hero-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 120px;
      color: #fff;
      line-height: 1;
      letter-spacing: 0.05em;
      opacity: 0;
    }

    .hero-subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: #888;
      letter-spacing: 0.3em;
      margin-top: 20px;
      opacity: 0;
    }

    /* Section 2 - Grid */
    .grid-section {
      padding: 120px 60px;
      background: #0d0d0d;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      border-radius: 4px;
      overflow: hidden;
      opacity: 0;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .card:hover img {
      transform: scale(1.03);
    }

    /* Section 3 - Horizontal text slide */
    .slide-section {
      background: #111;
      padding: 140px 0;
      overflow: hidden;
    }

    .slide-line {
      font-family: 'Bebas Neue', cursive;
      font-size: 80px;
      color: #fff;
      letter-spacing: 0.08em;
      padding: 10px 60px;
      white-space: nowrap;
      will-change: transform;
    }

    .slide-line:nth-child(2) {
      color: #555;
    }

    .slide-line:nth-child(3) {
      color: #fff;
    }

    /* Section 4 - CTA */
    .cta-section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: #0d0d0d;
      opacity: 0;
    }

    .cta-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 72px;
      color: #fff;
      letter-spacing: 0.05em;
      margin-bottom: 40px;
    }

    .cta-btn {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.2em;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: transparent;
      padding: 16px 40px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .cta-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <span>STUDIO</span>
    <span>2024</span>
  </header>

  <!-- Section 1: Hero -->
  <section class="hero">
    <h1 class="hero-title">VISUAL WORKS</h1>
    <p class="hero-subtitle">Photography &amp; Motion</p>
  </section>

  <!-- Section 2: Image Grid -->
  <section class="grid-section">
    <div class="grid">
      <div class="card"><img src="https://loremflickr.com/600/400/photography?random=1" alt="photo 1"></div>
      <div class="card"><img src="https://loremflickr.com/600/400/photography?random=2" alt="photo 2"></div>
      <div class="card"><img src="https://loremflickr.com/600/400/photography?random=3" alt="photo 3"></div>
      <div class="card"><img src="https://loremflickr.com/600/400/photography?random=4" alt="photo 4"></div>
      <div class="card"><img src="https://loremflickr.com/600/400/photography?random=5" alt="photo 5"></div>
      <div class="card"><img src="https://loremflickr.com/600/400/photography?random=6" alt="photo 6"></div>
    </div>
  </section>

  <!-- Section 3: Horizontal Text Slide -->
  <section class="slide-section">
    <div class="slide-line" id="line1">LIGHT &amp; SHADOW</div>
    <div class="slide-line" id="line2">MOTION &amp; STILL</div>
    <div class="slide-line" id="line3">FORM &amp; VOID</div>
  </section>

  <!-- Section 4: CTA -->
  <section class="cta-section">
    <h2 class="cta-title">Let's Work Together</h2>
    <button class="cta-btn">Get in Touch</button>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    // Section 1: Hero - load animation
    gsap.set('.hero-title', { y: 80, opacity: 0 });
    gsap.set('.hero-subtitle', { y: 80, opacity: 0 });

    var heroTl = gsap.timeline();
    heroTl
      .to('.hero-title', {
        y: 0,
        opacity: 1,
        duration: 1.2,
        ease: 'power3.out'
      })
      .to('.hero-subtitle', {
        y: 0,
        opacity: 1,
        duration: 1.2,
        ease: 'power3.out',
        delay: 0.3
      }, '-=0.9');

    // Section 2: Cards ScrollTrigger
    gsap.set('.card', { y: 60, opacity: 0 });

    ScrollTrigger.create({
      trigger: '.grid-section',
      start: 'top 75%',
      onEnter: function() {
        gsap.to('.card', {
          y: 0,
          opacity: 1,
          duration: 0.8,
          ease: 'power2.out',
          stagger: 0.15
        });
      }
    });

    // Section 3: Horizontal slide with scrub
    gsap.fromTo('#line1',
      { x: -200 },
      {
        x: 0,
        ease: 'none',
        scrollTrigger: {
          trigger: '.slide-section',
          start: 'top bottom',
          end: 'center center',
          scrub: true
        }
      }
    );

    gsap.fromTo('#line2',
      { x: 200 },
      {
        x: 0,
        ease: 'none',
        scrollTrigger: {
          trigger: '.slide-section',
          start: 'top bottom',
          end: 'center center',
          scrub: true
        }
      }
    );

    gsap.fromTo('#line3',
      { x: -200 },
      {
        x: 0,
        ease: 'none',
        scrollTrigger: {
          trigger: '.slide-section',
          start: 'top bottom',
          end: 'center center',
          scrub: true
        }
      }
    );

    // Section 4: CTA ScrollTrigger
    gsap.fromTo('.cta-section',
      { opacity: 0, scale: 0.9 },
      {
        opacity: 1,
        scale: 1,
        duration: 1,
        ease: 'power2.out',
        scrollTrigger: {
          trigger: '.cta-section',
          start: 'top 75%',
          toggleActions: 'play none none none'
        }
      }
    );
  </script>
</body>
</html>
