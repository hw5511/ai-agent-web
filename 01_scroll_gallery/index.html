<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Gallery Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html { overflow-x: hidden; }

body {
  background: #111;
  height: 500vh;
  overflow-x: hidden;
}

/* ---- Navigation ---- */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 26px 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

nav span {
  color: rgba(255,255,255,0.85);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
}

nav .nav-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
}

/* ---- Scroll hint ---- */
#scroll-hint {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 50;
  pointer-events: none;
  transition: opacity 0.5s ease;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: #fff;
  animation: hintPulse 1s ease-in-out infinite alternate;
}

@keyframes hintPulse {
  from { opacity: 0.3; }
  to   { opacity: 1.0; }
}

/* ---- Stage & Track ---- */
#stage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  overflow: visible;
  pointer-events: none;
}

#track {
  position: absolute;
  top: 50%;
  left: 0;
  display: flex;
  align-items: flex-end;
  will-change: transform;
}

/* ---- Card wrap ---- */
.card-wrap {
  position: relative;
  flex-shrink: 0;
  padding-bottom: 64px;
  pointer-events: all;
}

/* ---- Card ---- */
.card {
  width: 320px;
  height: 440px;
  border-radius: 22px;
  overflow: visible;
  position: relative;
  flex-shrink: 0;
  background: #1a1a1a;
  cursor: pointer;
}

.card:hover .card-face {
  transform: scale(1.03) translateY(-8px);
}

.card-face {
  width: 100%;
  height: 100%;
  position: relative;
  border-radius: 22px;
  overflow: visible;
  transition: transform 0.3s ease;
}

.card-inner {
  width: 100%;
  height: 100%;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: contrast(1.05) saturate(1.05);
}

.card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.30) 0%,
    transparent 35%,
    rgba(0,0,0,0.60) 100%
  );
}

.card-tags {
  position: absolute;
  top: 14px;
  left: 14px;
  right: 14px;
  display: flex;
  justify-content: space-between;
  z-index: 10;
}

.card-tags span {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.9);
}

.badge {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  padding: 5px 18px;
  border-radius: 50px;
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #111;
  font-weight: 700;
  white-space: nowrap;
}

/* border rendered as separate overlay so overflow: visible works */
.card-border {
  position: absolute;
  inset: 0;
  border-radius: 22px;
  pointer-events: none;
  z-index: 15;
}

/* title bleeds below card */
.card-title {
  position: absolute;
  bottom: -22px;
  left: -8px;
  right: -8px;
  z-index: 20;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 80px;
  font-weight: 900;
  line-height: 0.9;
  letter-spacing: 0.02em;
  text-align: left;
  pointer-events: none;
  white-space: nowrap;
}

/* ---- Progress bar ---- */
.progress-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: rgba(255,255,255,0.15);
  z-index: 200;
}

.bar-fill {
  height: 100%;
  width: 0%;
  background: #fff;
}
</style>
</head>
<body>

<nav>
  <span>STUDIO</span>
  <span class="nav-center">SCROLL GALLERY COLLECTION</span>
  <span>6 WORKS</span>
</nav>

<div id="scroll-hint">SCROLL</div>

<div id="stage">
  <div id="track"></div>
</div>

<div class="progress-bar">
  <div class="bar-fill" id="barFill"></div>
</div>

<script>
(function () {
  'use strict';

  var DATA = [
    { img:'images/01.jpg', border:'#5B8DEF', tag2:'INDIE POP',   title:'NEON WAVES',   rotate:-3,   yoff:0   },
    { img:'images/02.jpg', border:'#C8FF00', tag2:'SYNTH WAVE',  title:'VELVET DRIFT', rotate:2,    yoff:-35 },
    { img:'images/03.jpg', border:'#00E5CC', tag2:'DREAM POP',   title:'ECHO FLAME',   rotate:-1.5, yoff:22  },
    { img:'images/04.jpg', border:'#FFD700', tag2:'JAZZ FUSION', title:'PHANTOM BEAT', rotate:3,    yoff:-25 },
    { img:'images/05.jpg', border:'#FF69B4', tag2:'DARK WAVE',   title:'CRYSTAL VIBE', rotate:-2.5, yoff:32  },
    { img:'images/06.jpg', border:'#FF4444', tag2:'ELECTRO',     title:'JET FLAME',    rotate:1.5,  yoff:-12 }
  ];

  var MARGINS = [0, -50, -30, -48, -32, -48];

  var track      = document.getElementById('track');
  var scrollHint = document.getElementById('scroll-hint');
  var barFill    = document.getElementById('barFill');

  /* Build cards */
  DATA.forEach(function (d, i) {
    var wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    if (i > 0) wrap.style.marginLeft = MARGINS[i] + 'px';

    var card = document.createElement('div');
    card.className = 'card';

    var face = document.createElement('div');
    face.className = 'card-face';

    var inner = document.createElement('div');
    inner.className = 'card-inner';

    var img = document.createElement('img');
    img.src = d.img;
    img.alt = d.title;

    var overlay = document.createElement('div');
    overlay.className = 'card-overlay';

    var tags = document.createElement('div');
    tags.className = 'card-tags';
    var t1 = document.createElement('span');
    t1.textContent = 'COLLECTION';
    var t2 = document.createElement('span');
    t2.textContent = d.tag2;
    tags.appendChild(t1);
    tags.appendChild(t2);

    var badge = document.createElement('div');
    badge.className = 'badge';
    badge.textContent = 'FROM';
    badge.style.background = d.border;

    inner.appendChild(img);
    inner.appendChild(overlay);
    inner.appendChild(tags);
    inner.appendChild(badge);

    var brd = document.createElement('div');
    brd.className = 'card-border';
    brd.style.border = '12px solid ' + d.border;
    brd.style.boxShadow = '0 0 20px ' + d.border + '55, inset 0 0 8px ' + d.border + '22';

    var title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = d.title;
    title.style.color = d.border;
    title.style.textShadow = '2px 3px 0 #111, 0 0 32px ' + d.border + 'aa';

    face.appendChild(inner);
    face.appendChild(brd);
    face.appendChild(title);
    card.appendChild(face);
    wrap.appendChild(card);
    track.appendChild(wrap);
  });

  /* Scroll animation */
  var currentX = window.innerWidth;
  var targetX  = window.innerWidth;

  function lerp(a, b, t) { return a + (b - a) * t; }

  function getProgress() {
    var maxScroll = document.body.scrollHeight - window.innerHeight;
    if (maxScroll <= 0) return 0;
    return Math.min(Math.max(window.scrollY / maxScroll, 0), 1);
  }

  var wraps = null;

  function loop() {
    if (!wraps) wraps = track.querySelectorAll('.card-wrap');

    var progress = getProgress();
    var startX   = window.innerWidth;
    var endX     = -track.scrollWidth;

    targetX  = startX + (endX - startX) * progress;
    currentX = lerp(currentX, targetX, 0.08);

    track.style.transform = 'translateY(-50%) translateX(' + currentX + 'px)';

    /* Parallax rotation */
    var delta = (progress - 0.5) * 2;
    DATA.forEach(function (d, i) {
      var wrap = wraps[i];
      if (!wrap) return;
      var rot = d.rotate + delta * 0.5;
      wrap.style.transform = 'rotate(' + rot + 'deg) translateY(' + d.yoff + 'px)';
    });

    /* Progress bar */
    barFill.style.width = (progress * 100) + '%';

    /* Scroll hint */
    scrollHint.style.opacity = progress > 0.02 ? '0' : '';

    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
