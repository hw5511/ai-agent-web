<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
  </style>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">WEB 05</text>

  <!-- 실습 배지 -->
  <rect x="144" y="44" width="52" height="24" rx="12" fill="#fef3c7" stroke="#d1d5db" stroke-width="1"/>
  <text x="170" y="60" font-size="11" fill="#d97706" text-anchor="middle">실습 3</text>

  <!-- 제목 -->
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717">Three.js 회전 큐브 추가</text>

  <!-- 부제 -->
  <text x="60" y="178" font-size="19" fill="#6b7280">히어로 섹션에 3D 큐브가 천천히 돌아가는 효과를 만듭니다</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Claude 지시문 박스 -->
  <rect x="60" y="218" width="1160" height="110" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="90" y="256" font-size="16" font-weight="600" fill="#1e40af">"히어로 섹션 오른쪽에 Three.js로 만든 3D 큐브를 추가해줘.</text>
  <text x="90" y="284" font-size="16" fill="#1e40af">네온 파란색 와이어프레임 큐브가 천천히 회전하도록."</text>
  <text x="1190" y="320" font-size="12" fill="#93c5fd" text-anchor="end">Claude 지시문</text>

  <!-- 3D 큐브 구조 라벨 -->
  <text x="60" y="368" font-size="15" font-weight="600" fill="#374151">3D 큐브 구조</text>

  <!-- 구조 흐름 -->
  <!-- BoxGeometry -->
  <rect x="60" y="388" width="280" height="64" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="200" y="414" font-size="15" font-weight="700" fill="#38bdf8" text-anchor="middle">BoxGeometry</text>
  <text x="200" y="438" font-size="13" fill="#94a3b8" text-anchor="middle">큐브 형태 정의</text>

  <!-- 화살표 -->
  <text x="360" y="424" font-size="22" fill="#9ca3af" text-anchor="middle">→</text>

  <!-- MeshBasicMaterial -->
  <rect x="400" y="388" width="280" height="64" rx="10" fill="#1e1b4b" stroke="#4338ca" stroke-width="1.5"/>
  <text x="540" y="414" font-size="15" font-weight="700" fill="#a78bfa" text-anchor="middle">MeshBasicMaterial</text>
  <text x="540" y="438" font-size="13" fill="#c4b5fd" text-anchor="middle">재질/색상 지정</text>

  <!-- 화살표 -->
  <text x="700" y="424" font-size="22" fill="#9ca3af" text-anchor="middle">→</text>

  <!-- requestAnimationFrame -->
  <rect x="740" y="388" width="500" height="64" rx="10" fill="#171717" stroke="#374151" stroke-width="1.5"/>
  <text x="990" y="414" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">requestAnimationFrame</text>
  <text x="990" y="438" font-size="13" fill="#d1d5db" text-anchor="middle">매 프레임 rotation += 0.01</text>

  <!-- 연습 박스 -->
  <rect x="60" y="490" width="1160" height="80" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="90" y="526" font-size="15" fill="#166534">• 큐브 대신 구(SphereGeometry)로 바꿔보세요</text>
  <text x="90" y="552" font-size="15" fill="#166534">• 회전 속도를 2배로 올리거나 Y축만 회전하도록 변경해보세요</text>

  <!-- 하단 배너 -->
  <rect x="60" y="604" width="1160" height="56" rx="12" fill="#171717"/>
  <text x="640" y="639" font-size="15" fill="#ffffff" text-anchor="middle">Three.js는 복잡하지만 Claude에게 '어떤 형태, 무슨 색, 어떻게 움직여'만 말하면 됩니다</text>
</svg>
