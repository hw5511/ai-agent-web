<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
  </style>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">WEB 05</text>

  <!-- 실습 배지 -->
  <rect x="144" y="44" width="52" height="24" rx="12" fill="#fef3c7" stroke="#d1d5db" stroke-width="1"/>
  <text x="170" y="60" font-size="11" fill="#d97706" text-anchor="middle">실습 2</text>

  <!-- 제목 -->
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717">Typed.js 타이핑 효과 추가</text>

  <!-- 부제 -->
  <text x="60" y="178" font-size="19" fill="#6b7280">히어로 섹션의 직함이 자동으로 타이핑되게 만듭니다</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Claude 지시문 박스 -->
  <rect x="60" y="218" width="1160" height="110" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="90" y="256" font-size="16" font-weight="600" fill="#1e40af">"히어로 섹션의 직함 부분에 Typed.js를 적용해줘.</text>
  <text x="90" y="284" font-size="16" fill="#1e40af">"웹 개발자", "UI 디자이너", "Claude 전문가"가 순서대로 타이핑되도록."</text>
  <text x="1190" y="320" font-size="12" fill="#93c5fd" text-anchor="end">Claude 지시문</text>

  <!-- 구현 포인트 라벨 -->
  <text x="60" y="368" font-size="15" font-weight="600" fill="#374151">구현 포인트</text>

  <!-- 포인트 카드 3개 -->
  <!-- span 태그 준비 -->
  <rect x="60" y="388" width="340" height="100" rx="12" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="230" y="426" font-size="16" font-weight="700" fill="#d97706" text-anchor="middle">span 태그 준비</text>
  <text x="230" y="452" font-size="14" fill="#92400e" text-anchor="middle">id='typed'인 span 위치 지정</text>
  <text x="230" y="474" font-size="13" fill="#b45309" text-anchor="middle">텍스트가 출력될 위치 설정</text>

  <!-- CDN 추가 -->
  <rect x="460" y="388" width="340" height="100" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="630" y="426" font-size="16" font-weight="700" fill="#2563eb" text-anchor="middle">CDN 추가</text>
  <text x="630" y="452" font-size="14" fill="#1e40af" text-anchor="middle">Typed.js script 태그 삽입</text>
  <text x="630" y="474" font-size="13" fill="#3b82f6" text-anchor="middle">jsdelivr CDN 링크 사용</text>

  <!-- 초기화 코드 -->
  <rect x="860" y="388" width="360" height="100" rx="12" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="1040" y="426" font-size="16" font-weight="700" fill="#15803d" text-anchor="middle">초기화 코드</text>
  <text x="1040" y="452" font-size="14" fill="#166534" text-anchor="middle">new Typed('#typed', {...})</text>
  <text x="1040" y="474" font-size="13" fill="#16a34a" text-anchor="middle">JS에서 Typed 인스턴스 생성</text>

  <!-- 연습 박스 -->
  <rect x="60" y="516" width="1160" height="80" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="90" y="552" font-size="15" fill="#166534">• 나만의 직함 3~5가지를 strings에 넣어보세요</text>
  <text x="90" y="578" font-size="15" fill="#166534">• typeSpeed를 20으로 줄여서 더 빠른 타이핑 체험</text>

  <!-- 하단 배너 -->
  <rect x="60" y="624" width="1160" height="52" rx="12" fill="#171717"/>
  <text x="640" y="657" font-size="15" fill="#ffffff" text-anchor="middle">커서 깜빡임(showCursor)도 설정 가능해서 더 생동감 있게 만들 수 있습니다</text>
</svg>
