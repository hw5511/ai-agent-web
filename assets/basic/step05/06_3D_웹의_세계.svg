<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
  </style>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">WEB 05</text>

  <!-- 제목 -->
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717">Three.js — 브라우저에서 3D를 만든다</text>

  <!-- 부제 -->
  <text x="60" y="178" font-size="19" fill="#6b7280">WebGL을 쉽게 쓸 수 있게 해주는 3D 라이브러리</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Three.js 3요소 라벨 -->
  <text x="60" y="250" font-size="15" font-weight="600" fill="#374151">Three.js 3요소</text>

  <!-- 3요소 카드 3개 -->
  <!-- Scene -->
  <rect x="60" y="270" width="340" height="160" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="230" y="322" font-size="22" font-weight="700" fill="#38bdf8" text-anchor="middle">Scene</text>
  <text x="230" y="354" font-size="16" fill="#94a3b8" text-anchor="middle">3D 공간 (무대)</text>
  <text x="230" y="382" font-size="13" fill="#64748b" text-anchor="middle">오브젝트가 배치되는</text>
  <text x="230" y="400" font-size="13" fill="#64748b" text-anchor="middle">가상 공간</text>

  <!-- Camera -->
  <rect x="470" y="270" width="340" height="160" rx="16" fill="#1e1b4b" stroke="#4338ca" stroke-width="1.5"/>
  <text x="640" y="322" font-size="22" font-weight="700" fill="#a78bfa" text-anchor="middle">Camera</text>
  <text x="640" y="354" font-size="16" fill="#c4b5fd" text-anchor="middle">시점 (눈)</text>
  <text x="640" y="382" font-size="13" fill="#8b5cf6" text-anchor="middle">어느 각도에서 볼지</text>
  <text x="640" y="400" font-size="13" fill="#8b5cf6" text-anchor="middle">결정</text>

  <!-- Renderer -->
  <rect x="880" y="270" width="340" height="160" rx="16" fill="#14532d" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1050" y="322" font-size="22" font-weight="700" fill="#86efac" text-anchor="middle">Renderer</text>
  <text x="1050" y="354" font-size="16" fill="#bbf7d0" text-anchor="middle">렌더링 (출력)</text>
  <text x="1050" y="382" font-size="13" fill="#4ade80" text-anchor="middle">Canvas에 실제로</text>
  <text x="1050" y="400" font-size="13" fill="#4ade80" text-anchor="middle">그려냄</text>

  <!-- 활용 예시 -->
  <!-- 회전하는 3D 큐브 -->
  <rect x="60" y="460" width="340" height="80" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="230" y="492" font-size="15" font-weight="600" fill="#374151" text-anchor="middle">회전하는 3D 큐브</text>
  <text x="230" y="516" font-size="13" fill="#6b7280" text-anchor="middle">로딩/히어로 배경에 활용</text>

  <!-- 3D 구 -->
  <rect x="460" y="460" width="340" height="80" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="630" y="492" font-size="15" font-weight="600" fill="#374151" text-anchor="middle">3D 구(Sphere)</text>
  <text x="630" y="516" font-size="13" fill="#6b7280" text-anchor="middle">지구본, 파티클 구체</text>

  <!-- 3D 텍스트 -->
  <rect x="860" y="460" width="360" height="80" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="1040" y="492" font-size="15" font-weight="600" fill="#374151" text-anchor="middle">3D 텍스트</text>
  <text x="1040" y="516" font-size="13" fill="#6b7280" text-anchor="middle">입체감 있는 타이틀</text>

  <!-- 하단 배너 -->
  <rect x="60" y="580" width="1160" height="56" rx="12" fill="#171717"/>
  <text x="640" y="615" font-size="15" fill="#ffffff" text-anchor="middle">'회전하는 3D 큐브를 배경으로' — Claude가 Scene+Camera+Renderer 전부 작성해준다</text>
</svg>
