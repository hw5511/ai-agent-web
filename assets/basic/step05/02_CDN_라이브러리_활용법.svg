<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
  </style>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">WEB 05</text>

  <!-- 제목 -->
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717">CDN 라이브러리 — 한 줄로 기능 추가</text>

  <!-- 부제 -->
  <text x="60" y="178" font-size="19" fill="#6b7280">script 태그 하나로 수천 줄 코드의 효과를 씁니다</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- CDN 이란 라벨 -->
  <text x="60" y="250" font-size="15" font-weight="600" fill="#374151">CDN 이란</text>

  <!-- 개념 설명 박스 2개 -->
  <!-- 직접 구현 -->
  <rect x="60" y="270" width="500" height="100" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="90" y="304" font-size="16" font-weight="700" fill="#374151">직접 구현</text>
  <text x="90" y="332" font-size="14" fill="#6b7280">수백~수천 줄의 JavaScript 코드 작성 필요</text>
  <text x="90" y="352" font-size="13" fill="#9ca3af">모든 로직을 처음부터 작성해야 함</text>

  <!-- 화살표 -->
  <text x="580" y="327" font-size="28" fill="#9ca3af" text-anchor="middle">→</text>

  <!-- CDN 라이브러리 -->
  <rect x="620" y="270" width="600" height="100" rx="12" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="650" y="304" font-size="16" font-weight="700" fill="#15803d">CDN 라이브러리</text>
  <text x="650" y="332" font-size="14" fill="#166534">script 태그 1줄 추가만으로 동일한 효과 사용</text>
  <text x="650" y="352" font-size="13" fill="#16a34a">검증된 코드를 즉시 사용 가능</text>

  <!-- 주요 라이브러리 카드 3개 -->
  <!-- tsParticles -->
  <rect x="60" y="410" width="340" height="100" rx="12" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="230" y="448" font-size="18" font-weight="700" fill="#d97706" text-anchor="middle">tsParticles</text>
  <text x="230" y="474" font-size="14" fill="#92400e" text-anchor="middle">파티클 배경 효과</text>
  <text x="230" y="496" font-size="12" fill="#b45309" text-anchor="middle">입자가 부유하는 인터랙티브 배경</text>

  <!-- Typed.js -->
  <rect x="460" y="410" width="340" height="100" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="630" y="448" font-size="18" font-weight="700" fill="#2563eb" text-anchor="middle">Typed.js</text>
  <text x="630" y="474" font-size="14" fill="#1e40af" text-anchor="middle">자동 타이핑 텍스트</text>
  <text x="630" y="496" font-size="12" fill="#3b82f6" text-anchor="middle">문자가 자동으로 입력/삭제됨</text>

  <!-- Three.js -->
  <rect x="860" y="410" width="360" height="100" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="1040" y="448" font-size="18" font-weight="700" fill="#7c3aed" text-anchor="middle">Three.js</text>
  <text x="1040" y="474" font-size="14" fill="#6d28d9" text-anchor="middle">브라우저 3D 그래픽</text>
  <text x="1040" y="496" font-size="12" fill="#8b5cf6" text-anchor="middle">WebGL 기반 3D 렌더링</text>

  <!-- CDN 코드 예시 박스 -->
  <rect x="60" y="548" width="1160" height="50" rx="8" fill="#171717"/>
  <text x="90" y="578" font-size="14" fill="#a3e635" font-family="monospace">&lt;script src="https://cdn.jsdelivr.net/npm/tsparticles@2/..."&gt;&lt;/script&gt;</text>

  <!-- 하단 배너 -->
  <rect x="60" y="624" width="1160" height="52" rx="12" fill="#171717"/>
  <text x="640" y="656" font-size="15" fill="#ffffff" text-anchor="middle">라이브러리 이름만 알면 Claude가 CDN 링크와 설정 코드를 작성해준다</text>
</svg>
