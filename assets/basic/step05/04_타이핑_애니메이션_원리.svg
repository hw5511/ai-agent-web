<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
  </style>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">WEB 05</text>

  <!-- 제목 -->
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717">Typed.js — 자동으로 타이핑되는 텍스트</text>

  <!-- 부제 -->
  <text x="60" y="178" font-size="19" fill="#6b7280">여러 직함이 자동으로 입력되고 지워지는 효과</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 동작 흐름 라벨 -->
  <text x="60" y="250" font-size="15" font-weight="600" fill="#374151">동작 흐름</text>

  <!-- 흐름 다이어그램 4단계 -->
  <!-- 단계1: 문자열 배열 정의 -->
  <rect x="60" y="270" width="240" height="70" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="180" y="300" font-size="14" font-weight="600" fill="#374151" text-anchor="middle">문자열 배열 정의</text>
  <text x="180" y="322" font-size="12" fill="#6b7280" text-anchor="middle">'웹 개발자', '디자이너'</text>

  <!-- 화살표 -->
  <text x="320" y="311" font-size="22" fill="#9ca3af" text-anchor="middle">→</text>

  <!-- 단계2: 타이핑 시작 -->
  <rect x="360" y="270" width="240" height="70" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="480" y="300" font-size="14" font-weight="600" fill="#2563eb" text-anchor="middle">타이핑 시작</text>
  <text x="480" y="322" font-size="12" fill="#1e40af" text-anchor="middle">한 글자씩 출력</text>

  <!-- 화살표 -->
  <text x="620" y="311" font-size="22" fill="#9ca3af" text-anchor="middle">→</text>

  <!-- 단계3: 완성 후 대기 -->
  <rect x="660" y="270" width="240" height="70" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="780" y="300" font-size="14" font-weight="600" fill="#d97706" text-anchor="middle">완성 후 대기</text>
  <text x="780" y="322" font-size="12" fill="#92400e" text-anchor="middle">typeSpeed만큼 대기</text>

  <!-- 화살표 -->
  <text x="920" y="311" font-size="22" fill="#9ca3af" text-anchor="middle">→</text>

  <!-- 단계4: 역방향 삭제 -->
  <rect x="960" y="270" width="280" height="70" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="1100" y="300" font-size="14" font-weight="600" fill="#15803d" text-anchor="middle">역방향 삭제</text>
  <text x="1100" y="322" font-size="12" fill="#166534" text-anchor="middle">backSpeed로 지우기</text>

  <!-- 주요 설정 라벨 -->
  <text x="60" y="382" font-size="15" font-weight="600" fill="#374151">주요 설정</text>

  <!-- 설정 박스 -->
  <rect x="60" y="400" width="1160" height="130" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="90" y="430" font-size="15" fill="#374151">strings: ['웹 개발자', 'UI 디자이너', 'Claude 전문가']</text>
  <text x="90" y="458" font-size="15" fill="#374151">typeSpeed: 50    — 타이핑 속도 (ms)</text>
  <text x="90" y="486" font-size="15" fill="#374151">backSpeed: 30    — 지우는 속도 (ms)</text>
  <text x="90" y="514" font-size="15" fill="#374151">loop: true       — 무한 반복</text>

  <!-- 하단 배너 -->
  <rect x="60" y="572" width="1160" height="52" rx="12" fill="#171717"/>
  <text x="640" y="604" font-size="15" fill="#ffffff" text-anchor="middle">포트폴리오 히어로 섹션의 직함/소개를 자동으로 변환하는 효과입니다</text>
</svg>
