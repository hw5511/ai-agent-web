<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" letter-spacing="0.05em">WEB 02</text>

  <!-- 제목 -->
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">색상이 웹의 첫인상을 결정한다</text>

  <!-- 부제 -->
  <text x="60" y="178" font-size="19" fill="#6b7280" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">색상 팔레트 하나로 사이트의 분위기가 바뀐다</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 색상 역할 라벨 -->
  <text x="60" y="270" font-size="14" font-weight="600" fill="#9ca3af" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">색상 역할</text>

  <!-- 카드1: 웜 컬러 -->
  <rect x="60" y="294" width="260" height="110" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="190" y="340" font-size="18" font-weight="700" fill="#dc2626" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">웜 컬러</text>
  <text x="190" y="372" font-size="13" fill="#991b1b" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">빨강·주황·노랑 계열</text>

  <!-- 카드2: 쿨 컬러 -->
  <rect x="350" y="294" width="260" height="110" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="480" y="340" font-size="18" font-weight="700" fill="#2563eb" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">쿨 컬러</text>
  <text x="480" y="372" font-size="13" fill="#1e40af" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">파랑·보라·청록 계열</text>

  <!-- 카드3: 뉴트럴 -->
  <rect x="640" y="294" width="260" height="110" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="770" y="340" font-size="18" font-weight="700" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">뉴트럴</text>
  <text x="770" y="372" font-size="13" fill="#6b7280" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">흰색·회색·검정 계열</text>

  <!-- 카드4: 다크 모드 -->
  <rect x="930" y="294" width="290" height="110" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="1075" y="340" font-size="18" font-weight="700" fill="#7c3aed" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">다크 모드</text>
  <text x="1075" y="372" font-size="13" fill="#6d28d9" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">어두운 배경+밝은 텍스트</text>

  <!-- Claude 지시 예시 박스 -->
  <rect x="60" y="440" width="1160" height="90" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <!-- Claude 지시문 배지 -->
  <rect x="80" y="456" width="88" height="20" rx="10" fill="#2563eb"/>
  <text x="124" y="470" font-size="11" fill="#ffffff" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">Claude 지시문</text>
  <!-- 지시문 텍스트 -->
  <text x="80" y="504" font-size="15" fill="#1e40af" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">"배경을 어두운 네이비로, 텍스트는 흰색으로, 포인트 색상은 하늘색으로 바꿔줘."</text>

  <!-- 하단 배너 -->
  <rect x="60" y="620" width="1160" height="48" rx="10" fill="#f3f4f6"/>
  <text x="640" y="650" font-size="15" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">색상을 말로 설명하면 Claude가 hex 코드로 변환한다</text>
</svg>
