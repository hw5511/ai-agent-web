  <text x="804" y="459" font-size="14" fill="#9ca3af" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">→</text>

  <rect x="820" y="436" width="120" height="36" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="880" y="459" font-size="13" fill="#92400e" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">실습</text>

