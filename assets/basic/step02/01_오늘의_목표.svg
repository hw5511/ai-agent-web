  <rect x="972" y="436" width="120" height="36" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="1032" y="459" font-size="13" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">정리</text>

