  <text x="60" y="248" font-size="14" font-weight="600" fill="#9ca3af" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">오늘 배울 것</text>

  <!-- 카드1 -->
  <rect x="60" y="262" width="340" height="110" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
