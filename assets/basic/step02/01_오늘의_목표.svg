  <text x="230" y="342" font-size="14" fill="#6b7280" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">분위기를 결정하는 색상 조합</text>

  <!-- 카드2 -->
  <rect x="430" y="262" width="340" height="110" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="600" y="312" font-size="17" font-weight="700" fill="#171717" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">Google Fonts 적용</text>
  <text x="600" y="342" font-size="14" fill="#6b7280" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">CDN 한 줄로 폰트 변경</text>

  <!-- 카드3 -->
  <rect x="800" y="262" width="340" height="110" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="970" y="312" font-size="17" font-weight="700" fill="#171717" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">Before/After 비교</text>
  <text x="970" y="342" font-size="14" fill="#6b7280" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">같은 HTML, 완전히 다른 결과</text>

