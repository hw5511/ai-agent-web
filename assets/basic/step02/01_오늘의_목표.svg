  <text x="640" y="650" font-size="16" fill="#ffffff" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">색상과 폰트만 바꿔도 전문가처럼 보인다</text>
