<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle">WEB 08</text>
  <rect x="144" y="44" width="52" height="24" rx="12" fill="#fef3c7" stroke="#d1d5db" stroke-width="1"/>
  <text x="170" y="60" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#d97706" text-anchor="middle">실습 2</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">FONT JUDGMENT로 폰트 적용하기</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">판단 기준에 따라 최적의 폰트 조합을 선택합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Claude 지시문 박스 -->
  <rect x="60" y="218" width="1160" height="110" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="90" y="258" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#1d4ed8">"FONT JUDGMENT 기준으로 폰트를 적용해줘.</text>
  <text x="90" y="286" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#1d4ed8"> 사이트 분위기: 다크 테크 / 헤드라인: Inter / 본문: Noto Sans KR."</text>

  <!-- 적용 체크 라벨 -->
  <text x="60" y="368" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#9ca3af" font-weight="600">적용 체크</text>

  <!-- 체크 항목 박스 -->
  <rect x="60" y="386" width="1160" height="140" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 체크 항목 1 -->
  <rect x="80" y="404" width="12" height="12" rx="2" fill="#d1d5db"/>
  <text x="106" y="415" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#374151">가독성 — bold 적용 시 선명하게 보이는가</text>

  <!-- 체크 항목 2 -->
  <rect x="80" y="438" width="12" height="12" rx="2" fill="#d1d5db"/>
  <text x="106" y="449" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#374151">분위기 — 사이트 전체 톤과 일치하는가</text>

  <!-- 체크 항목 3 -->
  <rect x="80" y="472" width="12" height="12" rx="2" fill="#d1d5db"/>
  <text x="106" y="483" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#374151">조합 — 헤드라인과 본문이 자연스럽게 어울리는가</text>

  <!-- 체크 항목 4 -->
  <rect x="80" y="506" width="12" height="12" rx="2" fill="#d1d5db"/>
  <text x="106" y="517" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#374151">한글 — 한글 텍스트가 깨지지 않고 깔끔한가</text>

  <!-- 연습 박스 -->
  <rect x="60" y="548" width="1160" height="68" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="90" y="589" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#15803d">• '고급 감성' 분위기로 Playfair Display + Noto Serif 조합으로도 시도해보세요</text>

  <!-- 하단 배너 -->
  <rect x="60" y="634" width="1160" height="56" rx="10" fill="#171717"/>
  <text x="640" y="668" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">폰트는 사이트의 '목소리'다 — 톤에 맞는 폰트가 완성도를 결정한다</text>
</svg>
