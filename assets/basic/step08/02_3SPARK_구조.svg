<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle">WEB 08</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">3-SPARK — 핵심 아이디어 3개로 방향을 잡는다</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">프롬프트 작성 전에 SPARK 3개를 먼저 정합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- SPARK 란 라벨 -->
  <text x="60" y="250" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#9ca3af" font-weight="600">SPARK 란</text>
  <!-- SPARK 설명 박스 -->
  <rect x="60" y="268" width="1160" height="70" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="90" y="309" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#374151">시각적 핵심 아이디어 — 레이아웃, 인터랙션, 비주얼 중 가장 인상적인 1가지</text>

  <!-- 3-SPARK 예시 라벨 -->
  <text x="60" y="374" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#9ca3af" font-weight="600">3-SPARK 예시</text>

  <!-- SPARK 카드 1 -->
  <rect x="60" y="392" width="340" height="130" rx="12" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="230" y="422" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#d97706" text-anchor="middle">SPARK 01</text>
  <line x1="80" y1="430" x2="380" y2="430" stroke="#fcd34d" stroke-width="1"/>
  <text x="230" y="460" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="#92400e" text-anchor="middle">전면 다크 배경</text>
  <text x="230" y="488" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#78350f" text-anchor="middle">밝은 텍스트 대비</text>

  <!-- SPARK 카드 2 -->
  <rect x="470" y="392" width="340" height="130" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="640" y="422" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#2563eb" text-anchor="middle">SPARK 02</text>
  <line x1="490" y1="430" x2="790" y2="430" stroke="#93c5fd" stroke-width="1"/>
  <text x="640" y="460" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="#1e40af" text-anchor="middle">수평 갤러리</text>
  <text x="640" y="488" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">핀 스크롤 전환</text>

  <!-- SPARK 카드 3 -->
  <rect x="880" y="392" width="340" height="130" rx="12" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="1050" y="422" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#16a34a" text-anchor="middle">SPARK 03</text>
  <line x1="900" y1="430" x2="1200" y2="430" stroke="#86efac" stroke-width="1"/>
  <text x="1050" y="460" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="#15803d" text-anchor="middle">마그네틱 CTA</text>
  <text x="1050" y="488" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#15803d" text-anchor="middle">버튼이 끌려오는 효과</text>

  <!-- 하단 배너 -->
  <rect x="60" y="610" width="1160" height="56" rx="10" fill="#171717"/>
  <text x="640" y="644" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" font-weight="600" fill="#ffffff" text-anchor="middle">SPARK 없이 시작하면 Claude가 임의로 방향을 잡는다</text>
</svg>
