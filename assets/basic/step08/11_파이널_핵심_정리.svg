  <text x="640" y="638" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" font-weight="600" fill="#a3e635" text-anchor="middle">수고하셨습니다 — 당신은 이제 AI Agent Web 개발자입니다</text>
