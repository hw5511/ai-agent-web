  <text x="795" y="318" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">스크롤 트리거</text>

  <!-- WEB 04 -->
  <rect x="960" y="258" width="270" height="90" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
