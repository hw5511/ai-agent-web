  <text x="795" y="428" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#dc2626" text-anchor="middle">기획=프롬프트</text>

  <!-- WEB 08 -->
  <rect x="960" y="368" width="270" height="90" rx="10" fill="#171717" stroke="#374151" stroke-width="1"/>
  <text x="1095" y="400" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">WEB 08</text>
  <text x="1095" y="428" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">v12 파이널</text>

  <!-- 핵심 메시지 박스 -->
  <rect x="60" y="488" width="1160" height="80" rx="16" fill="#171717"/>
  <text x="640" y="520" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">코드를 몰라도</text>
  <text x="640" y="550" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="20" fill="#38bdf8" text-anchor="middle">Claude와 함께 전문가 수준의 웹을 만들 수 있다</text>

