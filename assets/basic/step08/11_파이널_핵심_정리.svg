  <text x="495" y="318" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#92400e" text-anchor="middle">색상·폰트</text>

  <!-- WEB 03 -->
  <rect x="660" y="258" width="270" height="90" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
