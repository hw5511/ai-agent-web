  <text x="195" y="318" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">HTML·CSS·JS</text>

  <!-- WEB 02 -->
  <rect x="360" y="258" width="270" height="90" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
