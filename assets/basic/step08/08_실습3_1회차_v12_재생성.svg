<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle">WEB 08</text>
  <rect x="144" y="44" width="52" height="24" rx="12" fill="#fef3c7" stroke="#d1d5db" stroke-width="1"/>
  <text x="170" y="60" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#d97706" text-anchor="middle">실습 3</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">1회차 랜딩페이지를 v12로 재생성</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">1회차에서 만든 페이지를 v12 프롬프트로 다시 만들어 비교합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- v12 프롬프트 템플릿 라벨 -->
  <text x="60" y="228" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#9ca3af" font-weight="600">v12 프롬프트 템플릿</text>

  <!-- 프롬프트 박스 (다크) -->
  <rect x="60" y="246" width="1160" height="220" rx="12" fill="#0f172a"/>
  <text x="90" y="278" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#a3e635">[SPARK-1] 전면 다크 배경 + 네온 포인트</text>
  <text x="90" y="302" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#a3e635">[SPARK-2] 마그네틱 CTA 버튼</text>
  <text x="90" y="326" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#a3e635">[SPARK-3] 스크롤 페이드인 섹션</text>
  <text x="90" y="354" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#a3e635">[AESTHETIC_PINCH] noisy-gradient + cinematic-spacing</text>
  <text x="90" y="378" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#a3e635">[FONT] Inter(헤드) + Noto Sans KR(본문)</text>
  <text x="90" y="406" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#a3e635">위 설정으로 포트폴리오 랜딩페이지를 제작해줘.</text>
  <text x="90" y="430" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#a3e635">배경 #0f172a, 포인트 #38bdf8, 전체 CSS 인라인.</text>

  <!-- 연습 박스 -->
  <rect x="60" y="490" width="1160" height="68" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="90" y="531" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#15803d">• 위 프롬프트를 복사해서 Claude에게 붙여넣고 결과를 1회차와 비교해보세요</text>

  <!-- 하단 배너 -->
  <rect x="60" y="580" width="1160" height="56" rx="10" fill="#171717"/>
  <text x="640" y="614" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" font-weight="600" fill="#ffffff" text-anchor="middle">같은 랜딩페이지, 다른 프롬프트 — 차이를 직접 눈으로 확인한다</text>
</svg>
