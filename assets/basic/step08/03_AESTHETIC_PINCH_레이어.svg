<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle">WEB 08</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">AESTHETIC_PINCH — 미감 핀치로 분위기를 강화한다</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">SPARK 위에 감성 레이어를 올려서 퀄리티를 높입니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- PINCH 개념 라벨 -->
  <text x="60" y="250" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#9ca3af" font-weight="600">PINCH 개념</text>
  <!-- 개념 박스 -->
  <rect x="60" y="268" width="1160" height="70" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="90" y="309" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#374151">디자이너가 무의식적으로 적용하는 미적 감각을 언어로 명시한 것</text>

  <!-- PINCH 카테고리 라벨 -->
  <text x="60" y="370" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#9ca3af" font-weight="600">PINCH 카테고리</text>

  <!-- PINCH 카드 1 - 텍스처 -->
  <rect x="60" y="390" width="260" height="110" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="190" y="424" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">텍스처</text>
  <text x="190" y="448" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">grain, noise</text>
  <text x="190" y="470" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#475569" text-anchor="middle">noisy gradient</text>

  <!-- PINCH 카드 2 - 공간감 -->
  <rect x="380" y="390" width="260" height="110" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="510" y="424" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#7c3aed" text-anchor="middle">공간감</text>
  <text x="510" y="448" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#7c3aed" text-anchor="middle">asymmetry</text>
  <text x="510" y="470" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#7c3aed" text-anchor="middle">off-center 배치</text>

  <!-- PINCH 카드 3 - 디테일 -->
  <rect x="700" y="390" width="260" height="110" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="830" y="424" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#15803d" text-anchor="middle">디테일</text>
  <text x="830" y="448" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#15803d" text-anchor="middle">micro-animation</text>
  <text x="830" y="470" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#15803d" text-anchor="middle">subtle hover</text>

  <!-- PINCH 카드 4 - 분위기 -->
  <rect x="1020" y="390" width="200" height="110" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="1120" y="424" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#c2410c" text-anchor="middle">분위기</text>
  <text x="1120" y="448" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#c2410c" text-anchor="middle">cinematic</text>
  <text x="1120" y="470" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#c2410c" text-anchor="middle">영화적 레이아웃</text>

  <!-- 프롬프트 적용 박스 -->
  <rect x="60" y="530" width="1160" height="70" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="90" y="571" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#1d4ed8">"AESTHETIC_PINCH: noisy-gradient + asymmetric-layout + cinematic-spacing"</text>

  <!-- 하단 배너 -->
  <rect x="60" y="630" width="1160" height="56" rx="10" fill="#171717"/>
  <text x="640" y="664" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">PINCH는 '왜 이 사이트가 느낌 있어 보이는가'를 언어로 잡아낸 것입니다</text>
</svg>
