<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" style="background:#ffffff">
  <defs>
    <style>text { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; }</style>
  </defs>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle">WEB 07</text>

  <!-- 실습 배지 -->
  <rect x="144" y="44" width="52" height="24" rx="12" fill="#fef3c7" stroke="#d1d5db" stroke-width="1"/>
  <text x="170" y="60" font-size="11" fill="#d97706" text-anchor="middle">실습 1</text>

  <!-- 제목 -->
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717">나쁜 프롬프트로 직접 체험하기</text>

  <!-- 부제 -->
  <text x="60" y="178" font-size="19" fill="#6b7280">모호한 지시를 Claude에게 내리고 결과를 확인합니다</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Claude 지시문 박스 -->
  <rect x="60" y="218" width="1160" height="70" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="640" y="260" font-size="18" fill="#dc2626" text-anchor="middle">"웹사이트를 예쁘고 고급스럽게 만들어줘."</text>

  <!-- 예상 결과 라벨 -->
  <text x="60" y="322" font-size="14" font-weight="600" fill="#374151">예상 결과</text>

  <!-- 결과 특징 박스 -->
  <rect x="60" y="340" width="1160" height="120" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="640" y="375" font-size="15" font-weight="600" fill="#374151" text-anchor="middle">Claude의 해석에 맡겨진 결과</text>
  <text x="640" y="403" font-size="14" fill="#6b7280" text-anchor="middle">내가 원하는 것과 다를 수 있음</text>
  <text x="640" y="431" font-size="14" fill="#6b7280" text-anchor="middle">수정을 여러 번 반복해야 함</text>

  <!-- 깨달음 포인트 라벨 -->
  <text x="60" y="494" font-size="14" font-weight="600" fill="#d97706">깨달음 포인트</text>

  <!-- 포인트 박스 -->
  <rect x="60" y="510" width="1160" height="70" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="640" y="550" font-size="15" fill="#92400e" text-anchor="middle">Claude는 수천 개의 '예쁜 사이트'를 알고 있다 — 어떤 것을 원하는지 말해줘야 한다</text>

  <!-- 하단 배너 -->
  <rect x="60" y="624" width="1160" height="52" rx="12" fill="#171717"/>
  <text x="640" y="656" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">결과를 보고 '이게 아닌데' 라고 느꼈다면 프롬프트가 부족한 것입니다</text>
</svg>
