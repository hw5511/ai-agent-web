<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" style="background:#ffffff">
  <defs>
    <style>text { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; }</style>
  </defs>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle">WEB 07</text>

  <!-- 실습 배지 -->
  <rect x="144" y="44" width="52" height="24" rx="12" fill="#fef3c7" stroke="#d1d5db" stroke-width="1"/>
  <text x="170" y="60" font-size="11" fill="#d97706" text-anchor="middle">실습 2</text>

  <!-- 제목 -->
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717">좋은 프롬프트로 다시 시도하기</text>

  <!-- 부제 -->
  <text x="60" y="178" font-size="19" fill="#6b7280">4가지 요소를 갖춘 프롬프트로 결과를 비교합니다</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Claude 지시문 박스 -->
  <rect x="60" y="218" width="1160" height="130" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="640" y="256" font-size="14" fill="#15803d" text-anchor="middle">"히어로 섹션의 배경(대상)을 다크 테크 스타일(스타일)로 바꿔줘.</text>
  <text x="640" y="282" font-size="14" fill="#15803d" text-anchor="middle">배경 #0f172a, 텍스트 흰색, 포인트 #38bdf8(수치).</text>
  <text x="640" y="308" font-size="14" fill="#15803d" text-anchor="middle">CSS만 수정하고 HTML 구조는 유지해줘(범위)."</text>
  <text x="640" y="334" font-size="12" fill="#4ade80" text-anchor="middle">← 대상 / 스타일 / 수치 / 범위 4요소 완성</text>

  <!-- 비교 결과 라벨 -->
  <text x="60" y="388" font-size="14" font-weight="600" fill="#374151">비교 결과</text>

  <!-- 비교 박스 2개 -->
  <rect x="60" y="404" width="540" height="110" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="330" y="438" font-size="15" font-weight="700" fill="#dc2626" text-anchor="middle">나쁜 프롬프트 결과</text>
  <text x="330" y="462" font-size="13" fill="#991b1b" text-anchor="middle">Claude가 임의로 판단 / 원하는 것과 다름</text>
  <text x="330" y="485" font-size="13" fill="#991b1b" text-anchor="middle">수정 3~5회 필요</text>

  <rect x="660" y="404" width="540" height="110" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="930" y="438" font-size="15" font-weight="700" fill="#15803d" text-anchor="middle">좋은 프롬프트 결과</text>
  <text x="930" y="462" font-size="13" fill="#166534" text-anchor="middle">의도한 대로 정확히 구현</text>
  <text x="930" y="485" font-size="13" fill="#166534" text-anchor="middle">첫 번째 시도에서 완성</text>

  <!-- 연습 박스 -->
  <rect x="60" y="540" width="1160" height="50" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="90" y="570" font-size="13" fill="#166534">• 4가지 요소(대상/스타일/수치/범위)를 모두 포함한 나만의 프롬프트를 작성해보세요</text>

  <!-- 하단 배너 -->
  <rect x="60" y="624" width="1160" height="52" rx="12" fill="#171717"/>
  <text x="640" y="656" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">좋은 프롬프트는 수정 횟수를 줄이고 결과물 퀄리티를 높인다</text>
</svg>
