<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">WEB 04</text>
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">4회차 — 호버·클릭·드래그 트리거</text>
  <text x="60" y="178" font-size="19" fill="#6b7280" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">마우스 움직임에 반응하는 인터랙션을 만듭니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb"/>

  <!-- 카드 3개 -->
  <rect x="60" y="240" width="340" height="160" rx="16" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
  <text x="230" y="295" font-size="22" font-weight="700" fill="#9d174d" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">마그네틱 버튼</text>
  <line x1="100" y1="310" x2="360" y2="310" stroke="#f9a8d4"/>
  <text x="230" y="350" font-size="15" fill="#6b7280" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">자기처럼 끌어당기는 버튼</text>

  <rect x="470" y="240" width="340" height="160" rx="16" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="640" y="295" font-size="22" font-weight="700" fill="#15803d" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">Flip Card</text>
  <line x1="510" y1="310" x2="770" y2="310" stroke="#86efac"/>
  <text x="640" y="350" font-size="15" fill="#6b7280" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">마우스 올리면 카드가 뒤집힘</text>

  <rect x="880" y="240" width="340" height="160" rx="16" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="1050" y="295" font-size="22" font-weight="700" fill="#1e40af" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">Spotlight Follow</text>
  <line x1="920" y1="310" x2="1180" y2="310" stroke="#93c5fd"/>
  <text x="1050" y="350" font-size="15" fill="#6b7280" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">마우스 위치에 빛 효과</text>

  <!-- 수업 흐름 -->
  <text x="60" y="454" font-size="14" fill="#9ca3af" font-weight="600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">수업 흐름</text>
  <rect x="60" y="466" width="1160" height="44" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="640" y="494" font-size="14" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">이론  →  실습  →  이론  →  실습  →  이론  →  실습  →  정리</text>

  <!-- 하단 배너 -->
  <rect x="0" y="660" width="1280" height="60" fill="#171717"/>
  <text x="640" y="697" font-size="16" fill="#ffffff" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">마우스가 닿는 순간 사이트가 반응한다</text>
</svg>
