<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">WEB 04</text>
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">CSS Transform vs JS 제어</text>
  <text x="60" y="178" font-size="19" fill="#6b7280" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">인터랙션 구현에 사용하는 두 가지 방법</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb"/>

  <!-- CSS Transform 카드 -->
  <rect x="60" y="240" width="530" height="280" rx="16" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="325" y="290" font-size="22" font-weight="700" fill="#15803d" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">CSS Transform</text>
  <line x1="100" y1="310" x2="550" y2="310" stroke="#86efac"/>
  <text x="325" y="342" font-size="14" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">rotateY(180deg) — 뒤집기</text>
  <text x="325" y="370" font-size="14" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">scale(1.1) — 확대</text>
  <text x="325" y="398" font-size="14" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">translateX(10px) — 이동</text>
  <text x="325" y="426" font-size="14" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">:hover 만으로 적용 가능</text>
  <rect x="100" y="448" width="450" height="40" rx="8" fill="#dcfce7"/>
  <text x="325" y="473" font-size="13" font-weight="700" fill="#166534" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">적합: Flip Card, 버튼 확대</text>

  <!-- JS 동적 제어 카드 -->
  <rect x="660" y="240" width="530" height="280" rx="16" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="925" y="290" font-size="22" font-weight="700" fill="#1e40af" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">JS 동적 제어</text>
  <line x1="700" y1="310" x2="1150" y2="310" stroke="#93c5fd"/>
  <text x="925" y="342" font-size="14" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">커서 좌표 실시간 추적</text>
  <text x="925" y="370" font-size="14" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">거리/각도 계산 가능</text>
  <text x="925" y="398" font-size="14" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">복잡한 물리 효과</text>
  <text x="925" y="426" font-size="14" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">mousemove 이벤트 필요</text>
  <rect x="700" y="448" width="450" height="40" rx="8" fill="#dbeafe"/>
  <text x="925" y="473" font-size="13" font-weight="700" fill="#1e3a8a" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">적합: 마그네틱, Spotlight</text>

  <!-- Claude에게 지시하는 법 박스 -->
  <rect x="60" y="560" width="1160" height="60" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="640" y="588" font-size="14" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">Claude에게 지시하는 법</text>
  <text x="640" y="610" font-size="14" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">'hover 시 뒤집히는 카드' → CSS  /  '마우스 따라다니는 효과' → JS</text>

  <!-- 하단 배너 -->
  <rect x="0" y="660" width="1280" height="60" fill="#171717"/>
  <text x="640" y="697" font-size="15" fill="#ffffff" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">효과의 복잡도에 따라 Claude가 적절한 방법을 선택해준다</text>
</svg>
