<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">WEB 04</text>
  <rect x="144" y="44" width="52" height="24" rx="12" fill="#fef3c7" stroke="#d1d5db" stroke-width="1"/>
  <text x="170" y="60" font-size="11" fill="#d97706" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">실습 1</text>
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">마그네틱 버튼 만들기</text>
  <text x="60" y="178" font-size="19" fill="#6b7280" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">마우스가 가까워지면 버튼이 끌려오는 효과</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb"/>

  <!-- Claude 지시문 박스 -->
  <rect x="60" y="218" width="1160" height="110" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="90" y="256" font-size="15" fill="#1e40af" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">"연락하기 버튼에 마그네틱 효과를 추가해줘.</text>
  <text x="90" y="284" font-size="15" fill="#1e40af" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">마우스가 버튼 근처에 오면 버튼이 마우스 방향으로 살짝 당겨지는 효과."</text>
  <text x="90" y="312" font-size="13" fill="#93c5fd" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">Claude 지시 예시</text>

  <!-- 동작 원리 라벨 -->
  <text x="60" y="368" font-size="14" fill="#9ca3af" font-weight="600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">동작 원리</text>

  <!-- 원리 3단계 -->
  <rect x="60" y="388" width="320" height="64" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="220" y="416" font-size="15" font-weight="700" fill="#374151" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">mousemove 감지</text>
  <text x="220" y="438" font-size="13" fill="#6b7280" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">커서 좌표 실시간 추적</text>

  <text x="400" y="424" font-size="20" fill="#9ca3af" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">→</text>

  <rect x="430" y="388" width="320" height="64" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="590" y="416" font-size="15" font-weight="700" fill="#1e40af" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">거리 계산</text>
  <text x="590" y="438" font-size="13" fill="#3b82f6" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">버튼 중심까지의 거리</text>

  <text x="800" y="424" font-size="20" fill="#9ca3af" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">→</text>

  <rect x="830" y="388" width="390" height="64" rx="10" fill="#171717"/>
  <text x="1025" y="416" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">transform 적용</text>
  <text x="1025" y="438" font-size="13" fill="#d1d5db" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">버튼이 커서 쪽으로 이동</text>

  <!-- 연습 박스 -->
  <rect x="60" y="490" width="1160" height="80" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="90" y="526" font-size="14" fill="#166534" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">• 당겨지는 강도를 더 강하게/약하게 바꿔보세요</text>
  <text x="90" y="554" font-size="14" fill="#166534" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">• 버튼 색상도 hover 시 변하도록 추가해보세요</text>

  <!-- 하단 배너 -->
  <rect x="0" y="660" width="1280" height="60" fill="#171717"/>
  <text x="640" y="697" font-size="15" fill="#ffffff" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">x,y 좌표를 JavaScript로 계산해서 translate에 적용하는 패턴입니다</text>
</svg>
