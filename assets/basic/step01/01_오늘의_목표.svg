<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">WEB 01</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">1회차 — 웹의 언어를 만나다</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">오늘 Claude Code로 랜딩페이지를 직접 만듭니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="270" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">오늘 배울 것</text>
  <!-- 카드 1: x=60, width=340, 중앙=230 -->
  <rect x="60" y="294" width="340" height="110" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="230" y="344" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#171717">HTML · CSS · JS 역할</text>
  <text x="230" y="372" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280">세 언어가 하는 일을 이해한다</text>
  <!-- 카드 2: x=430, width=340, 중앙=600 -->
  <rect x="430" y="294" width="340" height="110" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="600" y="344" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#171717">Claude로 랜딩페이지 제작</text>
  <text x="600" y="372" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280">지시만으로 완성까지</text>
  <!-- 카드 3: x=800, width=340, 중앙=970 -->
  <rect x="800" y="294" width="340" height="110" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="970" y="344" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#171717">구조와 스타일 분리</text>
  <text x="970" y="372" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280">분리 지시가 결과물을 좋게 만든다</text>
  <text x="60" y="470" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">수업 흐름</text>
  <text x="60" y="500" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="18" fill="#374151">이론 → 실습 → 이론 → 실습 → 이론 → 실습 → 정리</text>
  <text x="60" y="530" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" fill="#9ca3af">각 개념을 배우고 바로 Claude에게 지시해서 결과를 확인합니다</text>
  <rect x="60" y="618" width="1160" height="52" rx="10" fill="#171717"/>
  <text x="640" y="649" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" font-weight="600" fill="#ffffff">코드를 몰라도 됩니다 — Claude가 대신 씁니다</text>
</svg>
