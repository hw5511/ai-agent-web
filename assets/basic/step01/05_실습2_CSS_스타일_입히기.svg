<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">WEB 01</text>
  <rect x="144" y="44" width="52" height="24" rx="12" fill="#fef3c7" stroke="#d1d5db" stroke-width="1"/>
  <text x="170" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#d97706">실습 2</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#171717">CSS 스타일 입히기</text>
  <text x="60" y="174" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="18" fill="#6b7280">실습1에서 만든 HTML에 스타일을 추가합니다</text>
  <line x1="60" y1="200" x2="1220" y2="200" stroke="#e5e7eb" stroke-width="1"/>
  <!-- 지시문 -->
  <rect x="60" y="218" width="120" height="22" rx="11" fill="#2563eb"/>
  <text x="120" y="233" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">Claude 지시문</text>
  <rect x="60" y="248" width="1160" height="90" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="90" y="284" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="18" font-weight="600" fill="#1d4ed8">"위 HTML에 현대적인 CSS를 입혀줘.</text>
  <text x="90" y="316" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="18" font-weight="600" fill="#1d4ed8">어두운 배경, 흰 글씨, 버튼은 파란색으로."</text>
  <!-- before / after -->
  <text x="60" y="382" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">변화 체감 포인트</text>
  <rect x="60" y="400" width="530" height="160" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="325" y="430" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#9ca3af">CSS 전 (HTML만)</text>
  <rect x="90" y="445" width="470" height="100" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="120" y="475" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#374151">홍길동</text>
  <text x="120" y="498" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#6b7280">웹 개발자</text>
  <text x="120" y="520" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#6b7280">안녕하세요. 저는...</text>
  <rect x="120" y="525" width="60" height="18" fill="#e5e7eb"/>
  <text x="150" y="539" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="10" fill="#6b7280">연락하기</text>
  <rect x="650" y="400" width="530" height="160" rx="12" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="915" y="430" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#9ca3af">CSS 후 (스타일 적용)</text>
  <rect x="680" y="445" width="470" height="100" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="720" y="475" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#f9fafb">홍길동</text>
  <text x="720" y="498" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="12" fill="#60a5fa">웹 개발자</text>
  <text x="720" y="518" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#9ca3af">안녕하세요. 저는...</text>
  <rect x="720" y="525" width="70" height="18" rx="4" fill="#2563eb"/>
  <text x="755" y="539" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="10" font-weight="600" fill="#ffffff">연락하기</text>
  <rect x="60" y="620" width="1160" height="48" rx="10" fill="#f3f4f6"/>
  <text x="640" y="650" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#6b7280">같은 HTML — 완전히 다른 인상 · 이것이 CSS의 힘입니다</text>
</svg>
