<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">WEB 01</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">JS의 역할 — 정적 페이지에 행동을 추가한다</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">HTML+CSS만 있으면 화면은 고정돼 있다. JS가 생명을 불어넣는다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <!-- 정적 vs 동적 비교 -->
  <rect x="60" y="232" width="530" height="200" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="325" y="268" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#9ca3af">HTML + CSS 만 (정적)</text>
  <text x="90" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#374151">• 버튼을 클릭해도 아무 일이 없다</text>
  <text x="90" y="340" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#374151">• 메뉴는 항상 열려 있다</text>
  <text x="90" y="372" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#374151">• 스크롤해도 화면은 변하지 않는다</text>
  <text x="90" y="408" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#9ca3af">→ 사진처럼 고정된 화면</text>
  <text x="620" y="332" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="32" fill="#16a34a">+JS</text>
  <text x="620" y="360" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="22" fill="#9ca3af">→</text>
  <rect x="670" y="232" width="530" height="200" rx="14" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="935" y="268" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#15803d">HTML + CSS + JS (동적)</text>
  <text x="700" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#166534">• 버튼 클릭 → 팝업이 뜬다</text>
  <text x="700" y="340" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#166534">• 햄버거 버튼 → 메뉴가 열린다</text>
  <text x="700" y="372" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#166534">• 스크롤 → 요소가 나타난다</text>
  <text x="700" y="408" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#15803d">→ 사용자 행동에 반응하는 화면</text>
  <!-- JS 3대 트리거 -->
  <text x="60" y="480" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">JS가 반응하는 대표 트리거</text>
  <rect x="60" y="498" width="360" height="64" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="240" y="525" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#374151">click — 버튼·링크 클릭</text>
  <text x="240" y="548" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280">가장 기본적인 인터랙션</text>
  <rect x="460" y="498" width="360" height="64" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="640" y="525" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#374151">scroll — 스크롤 위치 감지</text>
  <text x="640" y="548" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280">3회차에서 본격적으로 다룸</text>
  <rect x="860" y="498" width="360" height="64" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="1040" y="525" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#374151">mousemove — 마우스 추적</text>
  <text x="1040" y="548" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280">4회차에서 본격적으로 다룸</text>
  <rect x="60" y="618" width="1160" height="52" rx="10" fill="#171717"/>
  <text x="640" y="649" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" font-weight="600" fill="#ffffff">JS 코드를 몰라도 됩니다 — "버튼 클릭하면 ~" 라고 말하면 됩니다</text>
</svg>
