<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle">WEB 06</text>

  <!-- 제목 -->
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717">어떤 배경 효과를 선택할까?</text>

  <!-- 부제 -->
  <text x="60" y="178" font-size="19" fill="#6b7280">사이트 목적에 따른 배경 선택 가이드</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 선택 기준 라벨 -->
  <text x="60" y="250" font-size="13" font-weight="600" fill="#374151">선택 기준</text>

  <!-- 테이블 헤더 (y=270 height=36) -->
  <rect x="60" y="270" width="340" height="36" fill="#171717"/>
  <text x="230" y="294" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">사이트 목적</text>
  <rect x="460" y="270" width="340" height="36" fill="#171717"/>
  <text x="630" y="294" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">추천 효과</text>
  <rect x="860" y="270" width="360" height="36" fill="#171717"/>
  <text x="1040" y="294" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">이유</text>

  <!-- 행1 (y=306 height=56) -->
  <rect x="60" y="306" width="340" height="56" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="230" y="340" font-size="14" fill="#92400e" text-anchor="middle">포트폴리오/개인 브랜드</text>
  <rect x="460" y="306" width="340" height="56" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="630" y="340" font-size="14" fill="#78350f" text-anchor="middle">VANTA WAVES / NET</text>
  <rect x="860" y="306" width="360" height="56" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="1040" y="340" font-size="14" fill="#78350f" text-anchor="middle">세련된 기술 감각 표현</text>

  <!-- 행2 (y=362 height=56) -->
  <rect x="60" y="362" width="340" height="56" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="230" y="396" font-size="14" fill="#1e40af" text-anchor="middle">스타트업/서비스 소개</text>
  <rect x="460" y="362" width="340" height="56" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="630" y="396" font-size="14" fill="#1e40af" text-anchor="middle">Canvas 파티클</text>
  <rect x="860" y="362" width="360" height="56" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="1040" y="396" font-size="14" fill="#1e40af" text-anchor="middle">역동적, 기술적 이미지</text>

  <!-- 행3 (y=418 height=56) -->
  <rect x="60" y="418" width="340" height="56" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="230" y="452" font-size="14" fill="#15803d" text-anchor="middle">크리에이티브/아트</text>
  <rect x="460" y="418" width="340" height="56" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="630" y="452" font-size="14" fill="#15803d" text-anchor="middle">VANTA FLAMES / BIRDS</text>
  <rect x="860" y="418" width="360" height="56" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="1040" y="452" font-size="14" fill="#15803d" text-anchor="middle">강렬하고 예술적 분위기</text>

  <!-- 고려사항 박스 -->
  <rect x="60" y="500" width="1160" height="80" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="90" y="534" font-size="14" fill="#374151">성능: 모바일에서 VANTA보다 Canvas가 가벼울 수 있음</text>
  <text x="90" y="562" font-size="14" fill="#6b7280">가독성: 배경이 강할수록 텍스트 대비 확보 필수</text>

  <!-- 하단 배너 -->
  <rect x="60" y="620" width="1160" height="56" rx="12" fill="#171717"/>
  <text x="640" y="655" font-size="17" font-weight="600" fill="#ffffff" text-anchor="middle">배경은 '어떤 느낌을 주고 싶은가'에서 선택을 시작한다</text>
</svg>
