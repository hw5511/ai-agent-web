<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle">WEB 06</text>

  <!-- 제목 -->
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717">VANTA.js — 클릭 한 번으로 3D 배경</text>

  <!-- 부제 -->
  <text x="60" y="178" font-size="19" fill="#6b7280">Three.js 기반의 아름다운 배경 효과 라이브러리</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- VANTA 효과 종류 라벨 -->
  <text x="60" y="250" font-size="13" font-weight="600" fill="#374151">VANTA 효과 종류</text>

  <!-- 첫 행 카드 (y=268 height=90) -->
  <!-- WAVES -->
  <rect x="60" y="268" width="350" height="90" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="235" y="306" font-size="18" font-weight="700" fill="#38bdf8" text-anchor="middle">WAVES</text>
  <text x="235" y="334" font-size="13" fill="#94a3b8" text-anchor="middle">물결치는 파도</text>

  <!-- NET -->
  <rect x="470" y="268" width="350" height="90" rx="10" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="645" y="306" font-size="18" font-weight="700" fill="#6ee7b7" text-anchor="middle">NET</text>
  <text x="645" y="334" font-size="13" fill="#94a3b8" text-anchor="middle">연결된 네트워크</text>

  <!-- BIRDS -->
  <rect x="880" y="268" width="340" height="90" rx="10" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
  <text x="1050" y="306" font-size="18" font-weight="700" fill="#c4b5fd" text-anchor="middle">BIRDS</text>
  <text x="1050" y="334" font-size="13" fill="#94a3b8" text-anchor="middle">날아다니는 새 떼</text>

  <!-- 두 번째 행 카드 (y=378 height=90) -->
  <!-- FLAMES -->
  <rect x="60" y="378" width="350" height="90" rx="10" fill="#0c0a09" stroke="#292524" stroke-width="1"/>
  <text x="235" y="416" font-size="18" font-weight="700" fill="#fb923c" text-anchor="middle">FLAMES</text>
  <text x="235" y="444" font-size="13" fill="#94a3b8" text-anchor="middle">타오르는 불꽃</text>

  <!-- FOG -->
  <rect x="470" y="378" width="350" height="90" rx="10" fill="#042f2e" stroke="#0d9488" stroke-width="1"/>
  <text x="645" y="416" font-size="18" font-weight="700" fill="#99f6e4" text-anchor="middle">FOG</text>
  <text x="645" y="444" font-size="13" fill="#94a3b8" text-anchor="middle">안개 효과</text>

  <!-- DOTS -->
  <rect x="880" y="378" width="340" height="90" rx="10" fill="#1c1917" stroke="#44403c" stroke-width="1"/>
  <text x="1050" y="416" font-size="18" font-weight="700" fill="#e7e5e4" text-anchor="middle">DOTS</text>
  <text x="1050" y="444" font-size="13" fill="#94a3b8" text-anchor="middle">점들의 파동</text>

  <!-- 사용법 박스 -->
  <rect x="60" y="498" width="1160" height="90" rx="12" fill="#171717"/>
  <text x="90" y="526" font-size="13" fill="#a3e635" font-family="'Courier New', monospace">VANTA.WAVES({el: "#hero", mouseControls: true, color: 0x1a1a2e})</text>
  <text x="90" y="556" font-size="12" fill="#6b7280">CDN 링크 추가 후 원하는 효과 이름으로 함수만 바꾸면 됩니다</text>

  <!-- 하단 배너 -->
  <rect x="60" y="620" width="1160" height="56" rx="12" fill="#0f172a"/>
  <text x="640" y="655" font-size="17" font-weight="600" fill="#38bdf8" text-anchor="middle">'VANTA WAVES 배경을 히어로에 적용해줘' — 이 한 줄이면 됩니다</text>
</svg>
