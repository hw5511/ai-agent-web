<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle">WEB 06</text>

  <!-- 제목 -->
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717">6회차 — 배경 효과와 순수 Canvas</text>

  <!-- 부제 -->
  <text x="60" y="178" font-size="19" fill="#6b7280">사이트 전체 배경을 살아있는 효과로 채웁니다</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 카드 3개 -->
  <!-- 카드1: VANTA.js -->
  <rect x="60" y="248" width="340" height="160" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="240" y="310" font-size="22" font-weight="700" fill="#171717" text-anchor="middle">VANTA.js</text>
  <line x1="100" y1="328" x2="380" y2="328" stroke="#e5e7eb" stroke-width="1"/>
  <text x="240" y="365" font-size="15" fill="#6b7280" text-anchor="middle">움직이는 3D 배경 라이브러리</text>

  <!-- 카드2: Canvas 2D -->
  <rect x="470" y="248" width="340" height="160" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="640" y="310" font-size="22" font-weight="700" fill="#171717" text-anchor="middle">Canvas 2D</text>
  <line x1="510" y1="328" x2="790" y2="328" stroke="#e5e7eb" stroke-width="1"/>
  <text x="640" y="365" font-size="15" fill="#6b7280" text-anchor="middle">픽셀 단위로 그리는 드로잉 API</text>

  <!-- 카드3: 별자리 파티클 -->
  <rect x="880" y="248" width="340" height="160" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="1050" y="310" font-size="22" font-weight="700" fill="#171717" text-anchor="middle">별자리 파티클</text>
  <line x1="920" y1="328" x2="1200" y2="328" stroke="#e5e7eb" stroke-width="1"/>
  <text x="1050" y="365" font-size="15" fill="#6b7280" text-anchor="middle">Canvas로 만드는 인터랙티브 배경</text>

  <!-- 하단 배너 -->
  <rect x="60" y="620" width="1160" height="56" rx="12" fill="#171717"/>
  <text x="640" y="655" font-size="17" font-weight="600" fill="#ffffff" text-anchor="middle">배경 하나로 사이트 전체의 분위기가 바뀐다</text>
</svg>
