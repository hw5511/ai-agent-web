<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle">WEB 06</text>

  <!-- 실습 배지 -->
  <rect x="144" y="44" width="52" height="24" rx="12" fill="#fef3c7" stroke="#d1d5db" stroke-width="1"/>
  <text x="170" y="60" font-size="11" fill="#d97706" text-anchor="middle">실습 3</text>

  <!-- 제목 -->
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717">나만의 배경 조합 완성</text>

  <!-- 부제 -->
  <text x="60" y="178" font-size="19" fill="#6b7280">VANTA 또는 Canvas를 선택해서 포트폴리오 배경을 완성합니다</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Claude 지시문 박스 -->
  <rect x="60" y="218" width="1160" height="110" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="90" y="256" font-size="15" fill="#1d4ed8">"지금까지 만든 포트폴리오에 배경 효과를 적용해줘.</text>
  <text x="90" y="284" font-size="15" fill="#1d4ed8">[선택한 효과] 사용, 색상 [색상], 텍스트 대비 유지."</text>
  <text x="90" y="312" font-size="12" fill="#93c5fd">Claude 지시문 예시 — 대괄호 안을 본인 선택으로 채워 사용하세요</text>

  <!-- 체크리스트 라벨 -->
  <text x="60" y="368" font-size="13" font-weight="600" fill="#374151">체크리스트</text>

  <!-- 체크 항목 4개 -->
  <!-- item1 y=388 -->
  <rect x="68" y="392" width="18" height="18" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="100" y="406" font-size="15" fill="#374151">배경 효과 선택 완료 (VANTA 또는 Canvas)</text>

  <!-- item2 y=438 -->
  <rect x="68" y="442" width="18" height="18" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="100" y="456" font-size="15" fill="#374151">히어로 텍스트 가독성 확인</text>

  <!-- item3 y=488 -->
  <rect x="68" y="492" width="18" height="18" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="100" y="506" font-size="15" fill="#374151">색상 테마와 배경 조화 확인</text>

  <!-- item4 y=538 -->
  <rect x="68" y="542" width="18" height="18" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="100" y="556" font-size="15" fill="#374151">모바일 성능 이상 없음 확인</text>

  <!-- 하단 배너 -->
  <rect x="60" y="620" width="1160" height="56" rx="12" fill="#171717"/>
  <text x="640" y="655" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">배경 효과 + 색상 + 폰트 + 인터랙션 = 이것이 1~6회차의 완성형입니다</text>
</svg>
