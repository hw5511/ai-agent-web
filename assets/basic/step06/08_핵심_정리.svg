<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle">WEB 06</text>

  <!-- 제목 -->
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717">6회차 핵심 정리</text>

  <!-- 부제 -->
  <text x="60" y="178" font-size="19" fill="#6b7280">오늘 배운 것 3가지</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 카드1: VANTA.js (fill="#fef3c7") -->
  <rect x="60" y="236" width="360" height="340" rx="16" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="240" y="290" font-size="36" font-weight="800" fill="#d97706" text-anchor="middle">01</text>
  <text x="240" y="330" font-size="22" font-weight="700" fill="#92400e" text-anchor="middle">VANTA.js</text>
  <line x1="90" y1="350" x2="400" y2="350" stroke="#fcd34d" stroke-width="1"/>
  <text x="240" y="382" font-size="13" fill="#78350f" text-anchor="middle">3D 배경 라이브러리</text>
  <text x="240" y="406" font-size="13" fill="#78350f" text-anchor="middle">효과 이름만 선택</text>
  <text x="240" y="430" font-size="13" fill="#78350f" text-anchor="middle">색상 2개로 커스텀</text>
  <line x1="90" y1="454" x2="400" y2="454" stroke="#fcd34d" stroke-width="1"/>
  <text x="240" y="490" font-size="13" font-weight="600" fill="#d97706" text-anchor="middle">3D 배경도 이름만 말하면 된다</text>
  <text x="240" y="510" font-size="12" fill="#92400e" text-anchor="middle"> </text>

  <!-- 카드2: Canvas 2D (fill="#dbeafe") -->
  <rect x="460" y="236" width="360" height="340" rx="16" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="640" y="290" font-size="36" font-weight="800" fill="#2563eb" text-anchor="middle">02</text>
  <text x="640" y="330" font-size="22" font-weight="700" fill="#1e40af" text-anchor="middle">Canvas 2D</text>
  <line x1="490" y1="350" x2="800" y2="350" stroke="#93c5fd" stroke-width="1"/>
  <text x="640" y="382" font-size="13" fill="#1e40af" text-anchor="middle">픽셀 단위 드로잉</text>
  <text x="640" y="406" font-size="13" fill="#1e40af" text-anchor="middle">requestAnimationFrame</text>
  <text x="640" y="430" font-size="13" fill="#1e40af" text-anchor="middle">별자리 파티클 구현</text>
  <line x1="490" y1="454" x2="800" y2="454" stroke="#93c5fd" stroke-width="1"/>
  <text x="640" y="490" font-size="13" font-weight="600" fill="#2563eb" text-anchor="middle">원+선 = 모든 효과</text>

  <!-- 카드3: 배경 선택 (fill="#dcfce7") -->
  <rect x="860" y="236" width="360" height="340" rx="16" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="1040" y="290" font-size="36" font-weight="800" fill="#16a34a" text-anchor="middle">03</text>
  <text x="1040" y="330" font-size="22" font-weight="700" fill="#15803d" text-anchor="middle">배경 선택</text>
  <line x1="890" y1="350" x2="1200" y2="350" stroke="#86efac" stroke-width="1"/>
  <text x="1040" y="382" font-size="13" fill="#15803d" text-anchor="middle">목적에 맞는 선택</text>
  <text x="1040" y="406" font-size="13" fill="#15803d" text-anchor="middle">가독성 항상 우선</text>
  <text x="1040" y="430" font-size="13" fill="#15803d" text-anchor="middle">모바일 성능 고려</text>
  <line x1="890" y1="454" x2="1200" y2="454" stroke="#86efac" stroke-width="1"/>
  <text x="1040" y="490" font-size="13" font-weight="600" fill="#16a34a" text-anchor="middle">배경은 분위기를 만든다</text>

  <!-- 하단 배너 -->
  <rect x="60" y="620" width="1160" height="56" rx="12" fill="#171717"/>
  <text x="640" y="655" font-size="17" font-weight="600" fill="#ffffff" text-anchor="middle">다음 7회차 — 기획과 프롬프트의 관계를 배운다</text>
</svg>
