<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-size="11" fill="#ffffff" letter-spacing="0.05em" text-anchor="middle">WEB 06</text>

  <!-- 실습 배지 -->
  <rect x="144" y="44" width="52" height="24" rx="12" fill="#fef3c7" stroke="#d1d5db" stroke-width="1"/>
  <text x="170" y="60" font-size="11" fill="#d97706" text-anchor="middle">실습 2</text>

  <!-- 제목 -->
  <text x="60" y="130" font-size="40" font-weight="700" fill="#171717">Canvas 별자리 파티클 구현</text>

  <!-- 부제 -->
  <text x="60" y="178" font-size="19" fill="#6b7280">마우스 움직임에 반응하는 별자리 연결 효과를 만듭니다</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Claude 지시문 박스 -->
  <rect x="60" y="218" width="1160" height="110" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="90" y="256" font-size="15" fill="#1d4ed8">"Canvas로 별자리 파티클 배경을 만들어줘.</text>
  <text x="90" y="284" font-size="15" fill="#1d4ed8">작은 점들이 천천히 움직이고, 가까운 점끼리 선으로 연결되며, 마우스에 반응하도록."</text>
  <text x="90" y="312" font-size="12" fill="#93c5fd">Claude 지시문 예시</text>

  <!-- 구현 요소 라벨 -->
  <text x="60" y="368" font-size="13" font-weight="600" fill="#374151">구현 요소</text>

  <!-- 3요소 카드 (y=388 height=100) -->
  <!-- 파티클 -->
  <rect x="60" y="388" width="340" height="100" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="230" y="428" font-size="16" font-weight="700" fill="#e5e7eb" text-anchor="middle">파티클</text>
  <text x="230" y="458" font-size="13" fill="#94a3b8" text-anchor="middle">움직이는 작은 점들</text>

  <!-- 연결선 -->
  <rect x="460" y="388" width="340" height="100" rx="12" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
  <text x="630" y="428" font-size="16" font-weight="700" fill="#c4b5fd" text-anchor="middle">연결선</text>
  <text x="630" y="458" font-size="13" fill="#94a3b8" text-anchor="middle">거리 내 점끼리 선 연결</text>

  <!-- 마우스 반응 -->
  <rect x="860" y="388" width="360" height="100" rx="12" fill="#042f2e" stroke="#0d9488" stroke-width="1"/>
  <text x="1040" y="428" font-size="16" font-weight="700" fill="#99f6e4" text-anchor="middle">마우스 반응</text>
  <text x="1040" y="458" font-size="13" fill="#94a3b8" text-anchor="middle">커서 근처 파티클 반발</text>

  <!-- 연습 박스 -->
  <rect x="60" y="516" width="1160" height="80" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="90" y="550" font-size="14" fill="#15803d">• 파티클 색상을 하늘색에서 황금색으로 바꿔보세요</text>
  <text x="90" y="578" font-size="14" fill="#15803d">• 연결 거리를 150에서 200으로 늘려 더 많이 연결되게 해보세요</text>

  <!-- 하단 배너 -->
  <rect x="60" y="620" width="1160" height="56" rx="12" fill="#171717"/>
  <text x="640" y="655" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">requestAnimationFrame으로 매 프레임 지우고 다시 그리는 것이 Canvas 애니메이션의 핵심입니다</text>
</svg>
