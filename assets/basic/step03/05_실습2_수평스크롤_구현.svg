<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">WEB 03</text>

  <!-- 실습 배지 -->
  <rect x="144" y="44" width="52" height="24" rx="12" fill="#fef3c7" stroke="#d1d5db" stroke-width="1"/>
  <text x="170" y="60" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#d97706" text-anchor="middle">실습 2</text>

  <!-- 제목 -->
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">수평 스크롤 섹션 구현</text>

  <!-- 부제 -->
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">Claude에게 지시해서 가로 스크롤 갤러리를 만듭니다</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Claude 지시문 박스 -->
  <rect x="60" y="218" width="1160" height="110" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="90" y="258" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#1e40af">"작품 갤러리 섹션을 추가해줘. 카드 4개가 가로로 나열되고,</text>
  <text x="90" y="286" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#1e40af">세로로 스크롤하면 옆으로 이동하는 수평 스크롤 효과."</text>
  <text x="90" y="314" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="12" fill="#93c5fd">— Claude 지시문</text>

  <!-- 구현 포인트 라벨 -->
  <text x="60" y="368" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#9ca3af" font-weight="600" letter-spacing="0.04em">구현 포인트</text>

  <!-- 포인트 카드 1 -->
  <rect x="60" y="383" width="340" height="100" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="230" y="420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#1e40af" text-anchor="middle">고정(pin)</text>
  <text x="230" y="446" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#3b82f6" text-anchor="middle">스크롤 중 섹션 위치 고정</text>

  <!-- 포인트 카드 2 -->
  <rect x="450" y="383" width="340" height="100" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="620" y="420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#15803d" text-anchor="middle">translateX</text>
  <text x="620" y="446" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">스크롤에 따라 X축 이동</text>

  <!-- 포인트 카드 3 -->
  <rect x="840" y="383" width="340" height="100" rx="12" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="1010" y="420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#d97706" text-anchor="middle">scrub</text>
  <text x="1010" y="446" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">스크롤 속도에 맞춰 부드럽게</text>

  <!-- 연습 박스 -->
  <rect x="60" y="516" width="1160" height="80" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="90" y="552" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#15803d">• 카드 개수를 6개로 늘려보세요</text>
  <text x="90" y="580" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#15803d">• 각 카드에 이미지 플레이스홀더와 텍스트를 추가해보세요</text>

  <!-- 하단 배너 -->
  <rect x="60" y="636" width="1160" height="48" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="640" y="665" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="600">GSAP의 pin + translateX 조합이 수평 스크롤의 핵심 패턴입니다</text>
</svg>
