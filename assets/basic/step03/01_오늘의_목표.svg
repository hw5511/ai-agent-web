  <text x="600" y="328" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">가로로 이동하는 섹션</text>

  <!-- 카드 3 -->
  <rect x="800" y="230" width="340" height="160" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="970" y="298" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" font-weight="700" fill="#171717" text-anchor="middle">텍스트 컬러 Reveal</text>
  <text x="970" y="328" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">스크롤 진행률로 색상 변화</text>

