  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 카드 1 -->
  <rect x="60" y="230" width="340" height="160" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="230" y="298" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" font-weight="700" fill="#171717" text-anchor="middle">스크롤 트리거 개념</text>
  <text x="230" y="328" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">위치에 따라 반응하는 원리</text>

  <!-- 카드 2 -->
