<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">WEB 03</text>

  <!-- 제목 -->
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">텍스트 컬러 Reveal — 스크롤로 글자가 살아난다</text>

  <!-- 부제 -->
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">스크롤 진행률에 따라 텍스트 색상이 바뀝니다</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 원리 라벨 -->
  <text x="60" y="250" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#9ca3af" font-weight="600" letter-spacing="0.04em">원리</text>

  <!-- 진행바 배경 -->
  <rect x="60" y="276" width="1160" height="24" rx="12" fill="#e5e7eb"/>
  <!-- 진행바 채움 (50%) -->
  <rect x="60" y="276" width="580" height="24" rx="12" fill="#171717"/>

  <!-- 진행률 라벨 -->
  <text x="640" y="260" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">스크롤 진행률 50%</text>

  <!-- 텍스트 예시 박스 -->
  <rect x="60" y="320" width="1160" height="80" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="90" y="370" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="22" font-weight="700">
    <tspan fill="#171717">Claude Code로 </tspan><tspan fill="#d1d5db">웹을 만든다</tspan>
  </text>

  <!-- 활용 예시 라벨 -->
  <text x="60" y="440" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#9ca3af" font-weight="600" letter-spacing="0.04em">활용 예시</text>

  <!-- 활용 카드 1 -->
  <rect x="60" y="460" width="540" height="80" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="330" y="494" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#374151" text-anchor="middle">히어로 헤드라인 강조</text>
  <text x="330" y="520" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">스크롤 내릴수록 문장이 밝아짐</text>

  <!-- 활용 카드 2 -->
  <rect x="660" y="460" width="540" height="80" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="930" y="494" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#374151" text-anchor="middle">스토리텔링 효과</text>
  <text x="930" y="520" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">읽는 속도에 따라 텍스트 강조</text>

  <!-- 하단 배너 -->
  <rect x="60" y="590" width="1160" height="48" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="640" y="619" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="600">progress 값(0~1)을 색상 opacity에 연결하는 패턴입니다</text>
</svg>
