<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>

  <!-- 회차 배지 -->
  <rect x="60" y="44" width="66" height="24" rx="12" fill="#171717"/>
  <text x="93" y="60" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">WEB 03</text>

  <!-- 제목 -->
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">수평 스크롤 — 가로로 펼쳐지는 섹션</text>

  <!-- 부제 -->
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">세로 스크롤이 가로 이동으로 변환됩니다</text>

  <!-- 구분선 -->
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 원리 라벨 -->
  <text x="60" y="256" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#9ca3af" font-weight="600" letter-spacing="0.04em">원리</text>

  <!-- 큰 컨테이너 박스 -->
  <rect x="60" y="270" width="1160" height="120" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 내부 섹션 박스 4개 -->
  <rect x="80" y="290" width="240" height="80" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="200" y="336" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#1e40af" text-anchor="middle">섹션 1</text>

  <rect x="340" y="290" width="240" height="80" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="460" y="336" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#15803d" text-anchor="middle">섹션 2</text>

  <rect x="600" y="290" width="240" height="80" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="720" y="336" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#d97706" text-anchor="middle">섹션 3</text>

  <rect x="860" y="290" width="240" height="80" rx="8" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
  <text x="980" y="336" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#be185d" text-anchor="middle">섹션 4</text>

  <!-- 화살표 설명 -->
  <text x="640" y="430" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#374151" text-anchor="middle">세로 스크롤 → 가로 이동</text>

  <!-- 사용 예시 카드 1 -->
  <rect x="60" y="450" width="540" height="80" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="330" y="484" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#374151" text-anchor="middle">포트폴리오 작품 갤러리</text>
  <text x="330" y="510" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">가로로 슬라이드하며 작품 감상</text>

  <!-- 사용 예시 카드 2 -->
  <rect x="660" y="450" width="540" height="80" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="930" y="484" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#374151" text-anchor="middle">서비스 소개 스텝별 설명</text>
  <text x="930" y="510" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">단계별 기능을 가로로 전개</text>

  <!-- 하단 배너 -->
  <rect x="60" y="580" width="1160" height="56" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="640" y="613" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#374151" text-anchor="middle" font-weight="600">'섹션 4개를 가로로 스크롤하게 만들어줘' — 이것만 말하면 된다</text>
</svg>
