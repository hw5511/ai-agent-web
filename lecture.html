<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 에이전트 수업자료</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
    <style>
        /*
         * Lecture App Style
         * Source: lecture/css/style_lecture.css
         *
         * Sections:
         *   1. Design Tokens
         *   2. Reset & Base
         *   3. App Header
         *   4. Course Tabs
         *   5. App Layout
         *   6. Sidebar
         *   7. Slide Area          — overflow:hidden, flex column, 스텝 전환
         *   8. Slide Navigation
         *   9. Session Content     — 2-col grid, 뷰포트 내 완전 수용
         *  10. Badge Variants
         */

        /* ============================================
           1. Design Tokens
           ============================================ */
        :root {
            --bg:           #fff;
            --fg:           #0a0a0a;
            --card:         #fff;
            --primary:      #171717;
            --primary-fg:   #fafafa;
            --secondary:    #f5f5f5;
            --muted:        #f5f5f5;
            --muted-fg:     #737373;
            --border:       #e5e5e5;

            --accent:        #2563eb;
            --accent-muted:  #eff6ff;
            --accent-border: #bfdbfe;

            --advanced:       #7c3aed;
            --advanced-muted: #fdf4ff;

            --success:        #16a34a;
            --success-muted:  #f0fdf4;
            --success-border: #bbf7d0;

            --radius:      0.5rem;
            --radius-full: 9999px;

            --font-xs:   0.75rem;
            --font-sm:   0.875rem;
            --font-base: 1rem;
            --font-lg:   1.125rem;
            --font-xl:   1.25rem;
            --font-2xl:  1.5rem;

            --sidebar-width:    260px;
            --slide-nav-height: 52px;
            --sidebar-transition: 0.22s ease;
            --slide-transition:   0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ============================================
           2. Reset & Base
           ============================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
        }

        .sidebar-toggle {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            border: none;
            background: transparent;
            color: var(--muted-fg);
            cursor: pointer;
            transition: background 0.14s, color 0.14s;
            flex-shrink: 0;
        }

        .sidebar-toggle:hover { background: var(--secondary); color: var(--fg); }

        /* ============================================
           4. Course Tabs
           ============================================ */
        .course-tabs {
            display: flex;
            gap: 0.2rem;
            background: var(--secondary);
            padding: 0.2rem;
            border-radius: var(--radius-full);
        }

        .course-tab {
            padding: 0.35rem 1rem;
            border-radius: var(--radius-full);
            font-size: var(--font-sm);
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--muted-fg);
            transition: background 0.18s, color 0.18s;
            white-space: nowrap;
        }

        .course-tab.active { background: var(--primary); color: var(--primary-fg); }

        /* ============================================
           5. App Layout
           ============================================ */
        .app-body {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* ============================================
           6. Sidebar
           ============================================ */
        .sidebar {
            width: var(--sidebar-width);
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            background: #fafafa;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition:
                width var(--sidebar-transition),
                border-color var(--sidebar-transition);
        }

        .sidebar.collapsed {
            width: 0;
            border-right-color: transparent;
        }

        .sidebar-inner {
            width: var(--sidebar-width);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 0.75rem 0.75rem 0.625rem;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }

        /* 사이드바 상단: 과정 탭 + 접기 버튼 */
        .sidebar-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        /* 사이드바 닫힌 상태에서 좌상단에 표시되는 재열기 버튼 */
        .sidebar-reopen {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            z-index: 50;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--muted-fg);
            cursor: pointer;
            transition: background 0.14s, color 0.14s, opacity 0.2s;
            opacity: 0;
            pointer-events: none;
        }
        .sidebar-reopen.visible { opacity: 1; pointer-events: auto; }
        .sidebar-reopen:hover { background: var(--secondary); color: var(--fg); }

        .sidebar-course-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: var(--font-xs);
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .sidebar-course-badge.basic    { background: var(--accent-muted);   color: var(--accent); }
        .sidebar-course-badge.advanced { background: var(--advanced-muted); color: var(--advanced); }

        .sidebar-course-title {
            font-size: 0.9375rem;
            font-weight: 700;
            color: var(--fg);
            line-height: 1.4;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 0.375rem 0.75rem 1rem;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .sidebar-nav::-webkit-scrollbar       { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .nav-item {
            display: flex;
            align-items: flex-start;
            gap: 0.625rem;
            padding: 0.5rem 0.625rem;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.13s;
            margin-bottom: 0.125rem;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }

        /* 비활성 그룹 흐리게 */
        .nav-group {
            opacity: 0.38;
            transition: opacity 0.18s;
        }
        .nav-group:has(.nav-item.active) {
            opacity: 1;
        }
        /* 비활성 그룹 호버: 검은색 테두리 */
        .nav-group:not(:has(.nav-item.active)):hover {
            opacity: 1;
        }
        .nav-group:not(:has(.nav-item.active)):hover .nav-item:hover {
            background: transparent;
            outline: 1.5px solid var(--fg);
        }

        .nav-item:hover          { background: var(--border); }
        .nav-item.active         { background: var(--primary); }

        .nav-num {
            font-size: var(--font-xs);
            font-weight: 700;
            color: var(--muted-fg);
            min-width: 18px;
            padding-top: 0.15rem;
            letter-spacing: 0.04em;
            flex-shrink: 0;
        }

        .nav-item.active .nav-num { color: rgba(255,255,255,0.45); }

        .nav-info {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
            min-width: 0;
        }

        .nav-title {
            font-size: var(--font-sm);
            font-weight: 600;
            color: var(--fg);
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-item.active .nav-title { color: var(--primary-fg); }

        .nav-hours {
            font-size: var(--font-xs);
            color: var(--muted-fg);
        }

        .nav-item.active .nav-hours { color: rgba(255,255,255,0.4); }


        /* ============================================
           7. Slide Area
           — 스텝 전환: overflow:hidden, translateX
           ============================================ */
        .slide-area {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        .slides-container {
            position: relative;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* 스텝 슬라이드 */
        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 1.25rem 1.75rem 1rem;
            transform: translateX(100%);
            transition: transform var(--slide-transition);
            will-change: transform;
        }

        .slide.is-prev   { transform: translateX(-100%); }
        .slide.is-active { transform: translateX(0); }

        /* ============================================
           8. Slide Navigation
           ============================================ */
        .slide-nav {
            height: var(--slide-nav-height);
            min-height: var(--slide-nav-height);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            flex-shrink: 0;
            background: var(--bg);
            gap: 1rem;
        }

        .slide-btn {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.35rem 0.875rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--fg);
            font-size: var(--font-sm);
            font-weight: 600;
            cursor: pointer;
            transition: background 0.13s, border-color 0.13s, opacity 0.13s;
            white-space: nowrap;
        }

        .slide-btn:hover:not(:disabled) { background: var(--secondary); border-color: #d4d4d4; }
        .slide-btn:disabled             { opacity: 0.3; cursor: not-allowed; }

        .slide-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.375rem;
        }

        .slide-counter {
            font-size: var(--font-xs);
            font-weight: 700;
            color: var(--muted-fg);
            letter-spacing: 0.06em;
        }

        .slide-dots {
            display: flex;
            gap: 0.3rem;
        }

        .slide-dot {
            width: 6px;
            height: 6px;
            border-radius: 3px;
            background: var(--border);
            transition: background 0.18s, width 0.18s;
            cursor: pointer;
            border: none;
            padding: 0;
        }

        .slide-dot.active { background: var(--primary); width: 16px; }

        /* ============================================
           9. Session Content
           — 상단: 제목 헤더
           — 하단: 좌 2/3 이미지 슬라이더 + 우 1/3 설명 영역
           — 세로 스크롤 없이 뷰포트 내 완전 수용
           ============================================ */

        .session-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .session-header {
            flex-shrink: 0;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.875rem;
            padding-bottom: 0.875rem;
            border-bottom: 1px solid var(--border);
        }

        .session-header-left {
            flex: 1;
            min-width: 0;
        }

        .slide-action-box {
            flex-shrink: 0;
            min-width: 0;
            max-width: 520px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.45rem 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .slide-action-box:empty {
            display: none;
        }

        .action-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted-fg);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .action-copy-row {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            min-width: 0;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.35rem 0.5rem;
            cursor: pointer;
        }

        .action-copy-row:hover { background: #f0f4ff; }

        .action-item-desc {
            font-size: 11px;
            color: var(--muted-fg);
            min-width: 36px;
            flex-shrink: 0;
        }

        .action-copy-code {
            flex: 1;
            min-width: 0;
            font-family: var(--mono, monospace);
            font-size: 12px;
            color: #374151;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .action-copy-btn {
            flex-shrink: 0;
            font-size: 11px;
            color: #9ca3af;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 0 0 0.25rem;
        }

        .action-download-link {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 13px;
            color: #1d4ed8;
            text-decoration: none;
            padding: 0.3rem 0;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .action-download-link:hover { text-decoration: underline; }

        .session-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
        }

        .session-title {
            font-size: var(--font-2xl);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--fg);
            line-height: 1.3;
        }

        /* 본문 — 이미지 슬라이더 단독 */
        .session-body {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            min-height: 0;
            overflow: hidden;
        }

        /* 좌측 2/3 — 이미지 슬라이더 영역 */
        .body-image {
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        /* 이미지 슬라이더 우측 하단 전체화면 진입 버튼 */
        .image-expand-btn {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            z-index: 10;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 6px;
            background: rgba(0,0,0,0.35);
            color: #fff;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.18s, background 0.18s;
        }
        .body-image:hover .image-expand-btn { opacity: 1; }
        .image-expand-btn:hover { background: rgba(0,0,0,0.6); }

        /* 전체화면 오버레이 */
        .fs-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fs-overlay[hidden] { display: none; }

        .fs-image-wrap {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fs-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .fs-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            color: #fff;
            cursor: pointer;
            transition: background 0.15s;
        }
        .fs-nav:hover    { background: rgba(255,255,255,0.25); }
        .fs-nav:disabled { opacity: 0.2; cursor: default; }
        .fs-nav.prev     { left: 1.25rem; }
        .fs-nav.next     { right: 1.25rem; }

        .fs-ui {
            position: absolute;
            bottom: 1.25rem;
            right: 1.25rem;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .fs-counter {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.04em;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }
        .fs-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 6px;
            background: rgba(255,255,255,0.12);
            color: #fff;
            cursor: pointer;
            transition: background 0.15s;
        }
        .fs-close:hover { background: rgba(255,255,255,0.25); }

        /* 이미지 슬라이더 — translateX 전환 */
        .image-slider {
            position: relative;
            flex: 1;
            overflow: hidden;
            border-radius: var(--radius);
            background: #ffffff;
            border: 1px solid var(--border);
            min-height: 0;
        }

        /* 개별 이미지 슬라이드 */
        .image-slide {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateX(100%);
            transition: transform var(--slide-transition);
            will-change: transform;
        }

        .image-slide.is-prev   { transform: translateX(-100%); }
        .image-slide.is-active { transform: translateX(0); }

        .image-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        /* 이미지 없을 때 플레이스홀더 */
        .image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
        }

        .image-placeholder-icon  { opacity: 0.35; }
        .image-placeholder-label { font-weight: 600; font-size: var(--font-sm); color: var(--muted-fg); }
        .image-placeholder-sub   { font-size: var(--font-xs); color: var(--muted-fg); opacity: 0.7; }

        /* 우측 1/3 — 설명 영역 */
        .body-desc {
            display: none;
        }

        .content-block {
            display: flex;
            flex-direction: column;
            min-height: 0;
            flex-shrink: 0;
        }

        .content-block.fill {
            flex: 1;
            min-height: 0;
        }

        .block-label {
            font-size: var(--font-xs);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted-fg);
            margin-bottom: 0.375rem;
            flex-shrink: 0;
        }

        .goal-card {
            padding: 0.75rem 1rem;
            background: var(--accent-muted);
            border: 1px solid var(--accent-border);
            border-radius: var(--radius);
        }

        .goal-card p {
            font-size: var(--font-sm);
            color: var(--accent);
            font-weight: 500;
            line-height: 1.65;
        }

        .topic-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            list-style: none;
            min-height: 0;
            overflow: hidden;
        }

        .topic-item {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            padding: 0.4rem 0.75rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: var(--font-sm);
            color: var(--fg);
            line-height: 1.4;
            flex-shrink: 0;
        }

        .topic-item::before {
            content: '';
            display: block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--muted-fg);
            margin-top: 0.42rem;
            flex-shrink: 0;
        }

        .practice-card {
            padding: 0.75rem 1rem;
            background: var(--success-muted);
            border: 1px solid var(--success-border);
            border-radius: var(--radius);
        }

        .practice-card p {
            font-size: var(--font-sm);
            color: var(--success);
            font-weight: 500;
            line-height: 1.65;
        }

        /* ============================================
           10. Badge Variants
           ============================================ */
        .badge-basic {
            background: var(--accent-muted);
            color: var(--accent);
            padding: 0.2rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: var(--font-xs);
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .badge-advanced {
            background: var(--advanced-muted);
            color: var(--advanced);
            padding: 0.2rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: var(--font-xs);
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .badge-hours {
            background: var(--secondary);
            color: var(--muted-fg);
            padding: 0.2rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: var(--font-xs);
            font-weight: 600;
        }

        /* ============================================
           Mobile Responsive (max-width: 768px)
           ============================================ */
        @media (max-width: 768px) {
            html, body {
                height: auto;
                overflow: auto;
            }

            .app-body {
                flex-direction: column;
                min-height: 100vh;
                overflow: auto;
            }

            /* 사이드바: overlay 방식으로 전환 */
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                z-index: 100;
                box-shadow: 2px 0 12px rgba(0,0,0,0.15);
                width: var(--sidebar-width) !important;
                transition: transform var(--sidebar-transition);
                transform: translateX(0);
            }

            .sidebar.collapsed {
                transform: translateX(-100%);
                width: var(--sidebar-width) !important;
                border-right-color: var(--border);
            }

            /* 메인 콘텐츠: 전체 너비 */
            .slide-area {
                flex: none;
                width: 100%;
                height: auto;
                overflow: visible;
            }

            .slides-container {
                height: auto;
                overflow: visible;
            }

            .slide {
                position: relative;
                transform: none !important;
                display: none;
            }

            .slide.is-active {
                display: block;
            }

            /* 세션 콘텐츠: 세로 레이아웃 */
            .session-inner {
                overflow: visible;
                height: auto;
                padding: 1rem;
            }

            .session-header {
                flex-direction: column;
                gap: 0.75rem;
            }

            .slide-action-box {
                max-width: 100%;
                width: 100%;
            }

            .session-title {
                font-size: var(--font-xl);
            }

            .session-body {
                grid-template-columns: 1fr;
                height: auto;
                overflow: visible;
            }

            /* 이미지 슬라이더: 고정 높이 대신 비율 유지 */
            .body-image {
                overflow: visible;
            }

            .image-slider {
                position: relative;
                height: 0;
                padding-bottom: 56.25%; /* 16:9 비율 (SVG 1280x720) */
                overflow: hidden;
            }

            .image-slide {
                position: absolute;
                inset: 0;
            }

            /* 슬라이드 전환: 모바일에서 translateX 대신 opacity */
            .image-slide { opacity: 0; transform: none !important; transition: opacity 0.22s; }
            .image-slide.is-active { opacity: 1; }
            .image-slide.is-prev   { opacity: 0; }

            /* 사이드바 reopen 버튼: 항상 표시 */
            .sidebar-reopen {
                opacity: 1 !important;
                pointer-events: auto !important;
            }

            /* 슬라이드 네비 */
            .slide-nav {
                padding: 0.5rem 1rem;
            }

            /* 슬라이드 dots 줄바꿈 허용 */
            .slide-dots {
                flex-wrap: wrap;
                max-width: 60vw;
            }
        }

                            { goal: 'VS Code에서 claude 명령어 오류 시 PATH를 자동 설정한다.', topics: ["'claude is not recognized' 오류 발생 시", 'path_setup.ps1 — PowerShell에서 실행', 'Node.js · Git · Claude 경로 자동 탐색 및 영구 등록', 'VS Code 재시작 후 정상 실행'], practice: null, action: { label: 'PATH 자동 설정 스크립트 (Windows)', copy: "# 1. 추가할 경로 리스트 초기화\n$pathsToAdd = @()\n\n# 2. Node.js & Git 기본 경로 탐색\n$basePaths = @(\"C:\\Program Files\\nodejs\", \"C:\\Program Files\\Git\\cmd\")\nforeach ($bp in $basePaths) {\n    if (Test-Path $bp) { $pathsToAdd += $bp }\n}\n\n# 3. Claude Code 네이티브 설치 경로 (핵심)\n$claudeNativePath = Join-Path $env:USERPROFILE \".local\\bin\"\n$claudeAppDataPath = \"$env:LOCALAPPDATA\\Programs\\claude-code\"\n\nif (Test-Path $claudeNativePath) { $pathsToAdd += $claudeNativePath }\nif (Test-Path $claudeAppDataPath) { $pathsToAdd += $claudeAppDataPath }\n\n# 4. npm 관련 경로 (Global Prefix)\ntry {\n    $npmPrefix = (npm config get prefix).Trim()\n    if ($npmPrefix -and (Test-Path $npmPrefix)) { $pathsToAdd += $npmPrefix }\n} catch {}\n\n$defaultNpmPath = \"$env:APPDATA\\npm\"\nif (Test-Path $defaultNpmPath) { $pathsToAdd += $defaultNpmPath }\n\n# --- 경로 등록 로직 (중복 제거 및 영구 적용) ---\n$pathsToAdd = $pathsToAdd | Select-Object -Unique\n\n# 시스템의 현재 사용자 PATH 불러오기\n$userPath = [Environment]::GetEnvironmentVariable(\"Path\", \"User\")\n$currentUserPaths = $userPath.Split(';', [System.StringSplitOptions]::RemoveEmptyEntries)\n\n# 없는 경로만 필터링\n$newPaths = $pathsToAdd | Where-Object { $currentUserPaths -notcontains $_ }\n\nif ($newPaths.Count -gt 0) {\n    $updatedPath = (($currentUserPaths + $newPaths) | Select-Object -Unique) -join ';'\n    [Environment]::SetEnvironmentVariable(\"Path\", $updatedPath, \"User\")\n    Write-Host \"PATH 환경 변수에 저장 완료:\" -ForegroundColor Green\n    $newPaths | ForEach-Object { Write-Host \" - $_\" }\n} else {\n    Write-Host \"모든 경로가 이미 등록되어 있습니다.\" -ForegroundColor Gray\n}\n\n# --- 현재 터미널 세션에 즉시 반영 ---\n$currentSessionPaths = $env:Path.Split(';', [System.StringSplitOptions]::RemoveEmptyEntries)\n$env:Path = (($currentSessionPaths + $pathsToAdd) | Select-Object -Unique) -join ';'\n\n# --- 검증 및 경로 분석 로직 ---\nWrite-Host \"`n[설치 상태 및 버전 확인]\" -ForegroundColor Cyan\nWrite-Host \"--------------------------------\"\n\n# Claude 상세 분석\n$claudeCheck = where.exe claude 2>$null\nif ($claudeCheck) {\n    $firstClaude = ($claudeCheck | Select-Object -First 1)\n    Write-Host \"Claude 실행 위치: $firstClaude\"\n    if ($firstClaude -like \"*\\.local\\bin\\*\") {\n        Write-Host \"현재 '네이티브(Native)' 버전 사용 중\" -ForegroundColor Yellow\n    } else {\n        Write-Host \"현재 'npm' 패키지 버전 사용 중\" -ForegroundColor Gray\n    }\n    try { \n        $version = claude --version\n        Write-Host \"Claude 버전: $version\" \n    } catch {}\n} else {\n    Write-Host \"Claude를 찾을 수 없습니다.\" -ForegroundColor Red\n}\n\nWrite-Host \"--------------------------------\"\nWrite-Host \"Node.js: $(try{node -v}catch{'N/A'})\"\nWrite-Host \"npm:     $(try{npm -v}catch{'N/A'})\"\nWrite-Host \"Git:     $(try{git --version}catch{'N/A'})\"\nWrite-Host \"--------------------------------\"" } },
                            { goal: 'Mac에서 claude 명령어 오류 시 PATH를 자동 설정한다.', topics: ["'claude: command not found' 오류 발생 시", 'bash 스크립트 — 터미널에서 실행', 'Homebrew · npm · Claude 경로 자동 탐색 및 ~/.zshrc 영구 등록', '심볼릭 링크 자동 복구 포함'], practice: null, action: { label: 'PATH 자동 설정 스크립트 (macOS)', copy: "#!/bin/bash\n\n# 1. 추가할 경로 리스트 초기화\npaths_to_add=()\n\n# 2. Homebrew 경로 탐색\nif [ -d \"/opt/homebrew/bin\" ]; then\n    paths_to_add+=(\"/opt/homebrew/bin\")\nfi\nif [ -d \"/usr/local/bin\" ]; then\n    paths_to_add+=(\"/usr/local/bin\")\nfi\n\n# 3. Claude Code 네이티브 설치 경로 (핵심)\nclaude_native_path=\"$HOME/.local/bin\"\nclaude_npm_path=\"$HOME/.npm-global/bin\"\n\nif [ -d \"$claude_native_path\" ]; then\n    paths_to_add+=(\"$claude_native_path\")\nfi\nif [ -d \"$claude_npm_path\" ]; then\n    paths_to_add+=(\"$claude_npm_path\")\nfi\n\n# 4. npm 관련 경로 (Global Prefix)\nif command -v npm &>/dev/null; then\n    npm_prefix=$(npm config get prefix 2>/dev/null)\n    if [ -n \"$npm_prefix\" ] && [ -d \"$npm_prefix/bin\" ]; then\n        paths_to_add+=(\"$npm_prefix/bin\")\n    fi\nfi\n\nnpm_global_default=\"$HOME/.npm-global/bin\"\nif [ -d \"$npm_global_default\" ]; then\n    paths_to_add+=(\"$npm_global_default\")\nfi\n\n# --- 경로 등록 로직 (중복 제거 및 영구 적용) ---\nshell_rc=\"$HOME/.zshrc\"\nif [ ! -f \"$shell_rc\" ]; then\n    shell_rc=\"$HOME/.bashrc\"\nfi\n\nadded_count=0\nfor p in \"${paths_to_add[@]}\"; do\n    if [[ \":$PATH:\" != *\":$p:\"* ]]; then\n        export PATH=\"$p:$PATH\"\n        if ! grep -qF \"$p\" \"$shell_rc\" 2>/dev/null; then\n            echo \"export PATH=\\\"$p:\\$PATH\\\"\" >> \"$shell_rc\"\n            echo \"  + $p (영구 등록)\"\n            added_count=$((added_count + 1))\n        fi\n    fi\ndone\n\nif [ $added_count -eq 0 ]; then\n    echo \"모든 경로가 이미 등록되어 있습니다.\"\nfi\n\n# --- Claude 심볼릭 링크 복구 (Homebrew 환경) ---\nif ! command -v claude &>/dev/null; then\n    npm_root=$(npm root -g 2>/dev/null)\n    claude_bin=\"$npm_root/@anthropic-ai/claude-code/bin/claude\"\n    if [ -f \"$claude_bin\" ]; then\n        brew_bin=\"/opt/homebrew/bin\"\n        if [ -d \"$brew_bin\" ]; then\n            rm -f \"$brew_bin/claude\"\n            ln -s \"$claude_bin\" \"$brew_bin/claude\"\n            echo \"Claude 심볼릭 링크 복구 완료: $brew_bin/claude\"\n        fi\n    fi\nfi\n\n# --- 검증 및 경로 분석 로직 ---\necho \"\"\necho \"[설치 상태 및 버전 확인]\"\necho \"--------------------------------\"\n\nclaude_path=$(which claude 2>/dev/null)\nif [ -n \"$claude_path\" ]; then\n    echo \"Claude 실행 위치: $claude_path\"\n    if [[ \"$claude_path\" == *\".local/bin\"* ]]; then\n        echo \"현재 '네이티브(Native)' 버전 사용 중\"\n    else\n        echo \"현재 'npm' 패키지 버전 사용 중\"\n    fi\n    claude --version 2>/dev/null || true\nelse\n    echo \"Claude를 찾을 수 없습니다.\"\n    echo \"터미널을 닫고 다시 열어서 재시도하세요.\"\nfi\n\necho \"--------------------------------\"\necho \"Node.js: $(node -v 2>/dev/null || echo 'N/A')\"\necho \"npm:     $(npm -v 2>/dev/null || echo 'N/A')\"\necho \"Git:     $(git --version 2>/dev/null || echo 'N/A')\"\necho \"--------------------------------\"" } },

        /* ============================================
           State
           ============================================ */
        let currentCourse  = 'basic';
        let currentSession = 0;   // 현재 스텝 인덱스
        let currentSlide   = 0;   // 현재 스텝 내 이미지 슬라이드 인덱스
        let sidebarOpen    = true;

        /* ============================================
           URL Hash State  (#course/sessionIdx/slideIdx)
           ============================================ */
        function pushHash() {
            const hash = '#' + currentCourse + '/' + (currentSession + 1) + '/' + (currentSlide + 1);
            if (location.hash !== hash) {
                history.replaceState(null, '', hash);
            }
        }

        function readHash() {
            const raw = location.hash.replace('#', '');
            if (!raw) return;
            const parts = raw.split('/');
            if (parts.length < 1) return;
            const course = parts[0];
            if (!COURSES[course]) return;
            currentCourse = course;
            const sessionIdx = Math.max((parseInt(parts[1]) || 1) - 1, 0);
            const slideIdx   = Math.max((parseInt(parts[2]) || 1) - 1, 0);
            const sessions   = COURSES[course].sessions;
            currentSession = Math.min(Math.max(sessionIdx, 0), sessions.length - 1);
            const slideCount = getSlideCount(sessions[currentSession]);
            currentSlide = Math.min(Math.max(slideIdx, 0), slideCount - 1);
            // 탭 UI 동기화
            document.querySelectorAll('.course-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.course === currentCourse);
            });
        }

        /* ============================================
           Helper
           ============================================ */
        function getSlideCount(session) {
            return (session.slides && session.slides.length > 0) ? session.slides.length : 1;
        }

        function getImagePath(course, stepNum, filename) {
            const stepFolder = 'step' + String(stepNum).padStart(2, '0');
            return 'assets/' + course + '/' + stepFolder + '/' + filename;
        }

        /* ============================================
           Slide Rendering
           ============================================ */
        function renderSlides(course) {
            const container = document.getElementById('slides-container');
            const data      = COURSES[course];

            container.innerHTML = data.sessions.map((s, i) => {
                const bc  = data.badgeClass;
                const num = String(s.num).padStart(2, '0');

                // 이미지 슬라이드 HTML 생성
                let imageSlidesHtml;
                if (s.slides && s.slides.length > 0) {
                    imageSlidesHtml = s.slides.map((filename, j) => {
                        const src = getImagePath(course, s.num, filename);
                        // 현재 세션의 첫 슬라이드만 즉시 로드, 나머지는 lazy (data-src)
                        const imgAttr = (i === currentSession && j === 0)
                            ? `src="${src}"`
                            : `data-src="${src}"`;
                        return `<div class="image-slide${j === 0 ? ' is-active' : ''}" data-img-index="${j}">
                            <img ${imgAttr} alt="${s.title} - ${j + 1}"
                                onerror="if(!this.dataset.src){this.style.display='none';this.nextElementSibling.style.display='flex'}">
                            <div class="image-placeholder" style="display:none">
                                <svg class="image-placeholder-icon" width="40" height="40" viewBox="0 0 40 40" fill="none">
                                    <rect x="4" y="8" width="32" height="24" rx="3" stroke="#a3a3a3" stroke-width="2"/>
                                    <circle cx="14" cy="17" r="3" stroke="#a3a3a3" stroke-width="1.5"/>
                                    <path d="M4 26l8-6 6 5 6-4 12 8" stroke="#a3a3a3" stroke-width="1.5" stroke-linejoin="round"/>
                                </svg>
                                <span class="image-placeholder-label">이미지 준비 중</span>
                                <span class="image-placeholder-sub">${s.title} · 슬라이드 ${j + 1}</span>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    imageSlidesHtml = `<div class="image-slide is-active" data-img-index="0">
                        <div class="image-placeholder">
                            <svg class="image-placeholder-icon" width="40" height="40" viewBox="0 0 40 40" fill="none">
                                <rect x="4" y="8" width="32" height="24" rx="3" stroke="#a3a3a3" stroke-width="2"/>
                                <circle cx="14" cy="17" r="3" stroke="#a3a3a3" stroke-width="1.5"/>
                                <path d="M4 26l8-6 6 5 6-4 12 8" stroke="#a3a3a3" stroke-width="1.5" stroke-linejoin="round"/>
                            </svg>
                            <span class="image-placeholder-label">이미지 / 실습 화면</span>
                            <span class="image-placeholder-sub">${s.title}</span>
                        </div>
                    </div>`;
                }

                return `
                <div class="slide${i === currentSession ? ' is-active' : ''}" data-step-index="${i}">
                    <div class="session-inner">

                        <div class="session-header">
                            <div class="session-header-left">
                                <div class="session-meta">
                                    <span class="badge-${bc}">${data.badgeText} ${num}</span>
                                    <span class="badge-hours">${s.hours}</span>
                                </div>
                                <h1 class="session-title">${s.title}</h1>
                            </div>
                            <div class="slide-action-box"></div>
                        </div>

                        <div class="session-body">

                            <div class="body-image">
                                <div class="image-slider" data-step="${i}">
                                    ${imageSlidesHtml}
                                </div>
                                <button class="image-expand-btn" title="전체화면 (슬라이드 모드)">
                                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                                        <path d="M1 5V1h4M9 1h4v4M13 9v4H9M5 13H1V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>

                            <div class="body-desc">
                                <div class="content-block">
                                    <div class="block-label">학습 목표</div>
                                    <div class="goal-card"><p class="desc-goal">${s.goal}</p></div>
                                </div>
                                <div class="content-block fill">
                                    <div class="block-label">주요 내용</div>
                                    <ul class="topic-list desc-topics">
                                        ${s.topics.map(t => `<li class="topic-item">${t}</li>`).join('')}
                                    </ul>
                                </div>
                                <div class="content-block">
                                    <div class="block-label">실습</div>
                                    <div class="practice-card"><p class="desc-practice">${s.practice}</p></div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        /* ============================================
           Step (스텝) 위치 적용
           ============================================ */
        function applySlidePositions() {
            document.querySelectorAll('.slide').forEach((el, i) => {
                el.classList.remove('is-prev', 'is-active');
                if (i < currentSession)       el.classList.add('is-prev');
                else if (i === currentSession) {
                    el.classList.add('is-active');
                    // 세션 전환 시 첫 번째 슬라이드 lazy load
                    const firstImg = el.querySelector('.image-slide[data-img-index="0"] img[data-src]');
                    if (firstImg && firstImg.dataset.src) {
                        firstImg.src = firstImg.dataset.src;
                        delete firstImg.dataset.src;
                    }
                }
            });
        }

        /* ============================================
           Image Slide (스텝 내 이미지) 위치 적용
           ============================================ */
        function applyImageSlidePositions() {
            document.querySelectorAll('.slide').forEach((slideEl, stepIdx) => {
                slideEl.querySelectorAll('.image-slide').forEach((imgSlide, imgIdx) => {
                    imgSlide.classList.remove('is-prev', 'is-active');
                    if (stepIdx === currentSession) {
                        // 현재 스텝: currentSlide 기준으로 위치 설정
                        if (imgIdx < currentSlide)       imgSlide.classList.add('is-prev');
                        else if (imgIdx === currentSlide) imgSlide.classList.add('is-active');
                        // lazy load: 현재 + 다음 슬라이드 미리 로드
                        if (imgIdx === currentSlide || imgIdx === currentSlide + 1) {
                            const img = imgSlide.querySelector('img[data-src]');
                            if (img && img.dataset.src) {
                                img.src = img.dataset.src;
                                delete img.dataset.src;
                            }
                        }
                    } else {
                        // 다른 스텝: 첫 번째 이미지만 active로 초기화
                        if (imgIdx === 0) imgSlide.classList.add('is-active');
                    }
                });
            });
        }

        /* ============================================
           Navigation Indicator
           ============================================ */
        function renderDots(count) {
            const dots = document.getElementById('slide-dots');
            dots.innerHTML = Array.from({ length: count }, (_, i) =>
                `<button class="slide-dot${i === currentSlide ? ' active' : ''}" data-index="${i}"></button>`
            ).join('');
            dots.querySelectorAll('.slide-dot').forEach(dot => {
                dot.addEventListener('click', () => {
                    const idx = parseInt(dot.dataset.index);
                    currentSlide = idx;
                    applyImageSlidePositions();
                    updateIndicator();
                });
            });
        }

        function updateIndicator() {
            const session    = COURSES[currentCourse].sessions[currentSession];
            const slideCount = getSlideCount(session);
            const stepNum    = String(currentSession + 1).padStart(2, '0');

            document.getElementById('slide-counter').textContent =
                `${String(currentSlide + 1).padStart(2, '0')} / ${String(slideCount).padStart(2, '0')}`;

            document.querySelectorAll('.slide-dot').forEach((d, i) =>
                d.classList.toggle('active', i === currentSlide)
            );

            const totalSessions = COURSES[currentCourse].sessions.length;
            const isFirst = currentSession === 0 && currentSlide === 0;
            const isLast  = currentSession === totalSessions - 1 && currentSlide === slideCount - 1;

            document.getElementById('btn-prev').disabled = isFirst;
            document.getElementById('btn-next').disabled = isLast;
        }

        /* ============================================
           Sidebar
           ============================================ */
        function renderSidebar(course) {
            const data = COURSES[course];
            document.getElementById('sidebar-badge').className = `sidebar-course-badge ${data.badgeClass}`;
            document.getElementById('sidebar-badge').textContent = data.badgeText;
            document.getElementById('sidebar-title').textContent = data.title;

            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = data.sessions.map((s, i) => {
                const isActive = i === currentSession;
                return `<div class="nav-group" data-group="${i}">
                    <button class="nav-item${isActive ? ' active' : ''}" data-index="${i}">
                        <span class="nav-num">${String(s.num).padStart(2, '0')}</span>
                        <span class="nav-info">
                            <span class="nav-title">${s.title}</span>
                            <span class="nav-hours">${s.hours}</span>
                        </span>
                    </button>
                </div>`;
            }).join('');

            nav.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    goToSession(parseInt(item.dataset.index));
                });
            });
        }

        function updateSidebarActive() {
            document.querySelectorAll('.nav-item').forEach((item, i) => {
                item.classList.toggle('active', i === currentSession);
            });
        }

        /* ============================================
           Navigation Logic
           ============================================ */

        // 스텝 내 이미지 슬라이드 이동 (경계에서 스텝 전환)
        function goToSlide(delta) {
            const session    = COURSES[currentCourse].sessions[currentSession];
            const slideCount = getSlideCount(session);
            const next       = currentSlide + delta;
            const totalSessions = COURSES[currentCourse].sessions.length;

            if (next < 0) {
                // 이전 스텝으로 이동 (마지막 슬라이드로)
                if (currentSession > 0) {
                    const prevSession    = COURSES[currentCourse].sessions[currentSession - 1];
                    const prevSlideCount = getSlideCount(prevSession);
                    goToSession(currentSession - 1, prevSlideCount - 1);
                }
            } else if (next >= slideCount) {
                // 다음 스텝으로 이동 (첫 슬라이드로)
                if (currentSession < totalSessions - 1) {
                    goToSession(currentSession + 1, 0);
                }
            } else {
                currentSlide = next;
                applyImageSlidePositions();
                updateIndicator();
                updateSidebarActive();
                updateDescPanel();
                pushHash();
            }
        }

        // 특정 스텝으로 이동
        function goToSession(index, slideIndex = 0) {
            const count = COURSES[currentCourse].sessions.length;
            if (index < 0 || index >= count) return;
            currentSession = index;
            currentSlide   = slideIndex;
            applySlidePositions();
            applyImageSlidePositions();
            renderDots(getSlideCount(COURSES[currentCourse].sessions[currentSession]));
            updateIndicator();
            updateSidebarActive();
            updateDescPanel();
            pushHash();
        }

        /* ============================================
           Desc Panel Update (슬라이드별 우측 패널 갱신)
           ============================================ */
        function updateDescPanel() {
            const activeEl = document.querySelector('.slide.is-active');
            if (!activeEl) return;

            const session = COURSES[currentCourse].sessions[currentSession];
            const sd      = session.slideDescs && session.slideDescs[currentSlide];

            const goalEl   = activeEl.querySelector('.desc-goal');
            const topicsEl = activeEl.querySelector('.desc-topics');
            const pracEl   = activeEl.querySelector('.desc-practice');

            if (goalEl)   goalEl.textContent   = (sd && sd.goal)     ? sd.goal     : session.goal;
            if (pracEl)   pracEl.textContent   = (sd && sd.practice) ? sd.practice : session.practice;

            const items = (sd && sd.topics) ? sd.topics : session.topics;
            if (topicsEl) topicsEl.innerHTML = items.map(t => `<li class="topic-item">${t}</li>`).join('');

            const actionBox = activeEl.querySelector('.slide-action-box');
            if (actionBox) {
                const act = sd && sd.action;
                if (act) {
                    const enc = s => s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    let html = '';
                    if (act.label) html += `<div class="action-label">${act.label}</div>`;
                    if (act.copy) {
                        html += `<div class="action-copy-row" data-copy="${enc(act.copy)}" onclick="copyToClipboard(this.dataset.copy,this)"><code class="action-copy-code">${enc(act.copy)}</code><span class="action-copy-btn">복사</span></div>`;
                    }
                    if (act.items) {
                        act.items.forEach(item => {
                            if (item.link) {
                                html += `<a class="action-download-link" href="${enc(item.link.href)}" target="_blank" rel="noopener">`;
                                if (item.desc) html += `${item.desc} — `;
                                html += `${item.link.text}</a>`;
                            } else {
                                html += `<div class="action-copy-row" data-copy="${enc(item.copy)}" onclick="copyToClipboard(this.dataset.copy,this)">`;
                                if (item.desc) html += `<span class="action-item-desc">${item.desc}</span>`;
                                html += `<code class="action-copy-code">${enc(item.copy)}</code><span class="action-copy-btn">복사</span></div>`;
                            }
                        });
                    }
                    if (act.download) html += `<a class="action-download-link" href="${enc(act.download.href)}" target="_blank" rel="noopener">↓ ${act.download.text}</a>`;
                    if (act.type === 'download' && act.path) {
                        const fname = act.path.split('/').pop();
                        html += `<a class="action-download-link" href="${enc(act.path)}" download>↓ ${enc(act.label || fname)}</a>`;
                    } else if (act.type === 'download-folder' && act.path) {
                        const zipPath = act.path.endsWith('.zip') ? act.path : act.path + '.zip';
                        html += `<a class="action-download-link" href="${enc(zipPath)}" download>↓ ${enc(act.label || '템플릿 다운로드')} (zip)</a>`;
                    } else if (act.type === 'link' && act.url) {
                        html += `<a class="action-download-link" href="${enc(act.url)}" target="_blank" rel="noopener">→ ${enc(act.label || act.url)}</a>`;
                    }
                    actionBox.innerHTML = html;
                } else {
                    actionBox.innerHTML = '';
                }
            }
        }

        function copyToClipboard(text, el) {
            navigator.clipboard.writeText(text).then(() => {
                const btn = el.querySelector('.action-copy-btn');
                if (btn) { btn.textContent = '완료'; setTimeout(() => { btn.textContent = '복사'; }, 1500); }
            });
        }

        /* ============================================
           Event Listeners
           ============================================ */
        document.getElementById('sidebar-toggle').addEventListener('click', () => {
            sidebarOpen = false;
            document.getElementById('sidebar').classList.add('collapsed');
            document.getElementById('sidebar-reopen').classList.add('visible');
        });

        document.getElementById('sidebar-reopen').addEventListener('click', () => {
            sidebarOpen = true;
            document.getElementById('sidebar').classList.remove('collapsed');
            document.getElementById('sidebar-reopen').classList.remove('visible');
        });

        document.getElementById('btn-prev').addEventListener('click', () => goToSlide(-1));
        document.getElementById('btn-next').addEventListener('click', () => goToSlide(1));

        document.addEventListener('keydown', e => {
            const fsOpen = !document.getElementById('fs-overlay').hidden;
            if (e.key === 'ArrowLeft')  { goToSlide(-1); if (fsOpen) fsUpdateImage(); }
            if (e.key === 'ArrowRight') { goToSlide(1);  if (fsOpen) fsUpdateImage(); }
        });

        /* ============================================
           Course Tab Switch
           ============================================ */
        document.querySelectorAll('.course-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentCourse  = tab.dataset.course;
                currentSession = 0;
                currentSlide   = 0;
                renderSlides(currentCourse);
                renderDots(getSlideCount(COURSES[currentCourse].sessions[0]));
                renderSidebar(currentCourse);
                updateIndicator();
                pushHash();
            });
        });

        /* ============================================
           Fullscreen Mode
           ============================================ */
        function fsUpdateImage() {
            const session    = COURSES[currentCourse].sessions[currentSession];
            const slideCount = getSlideCount(session);
            const img        = document.getElementById('fs-img');

            if (session.slides && session.slides.length > 0) {
                img.src = getImagePath(currentCourse, session.num, session.slides[currentSlide]);
                img.alt = session.title + ' - ' + (currentSlide + 1);
            } else {
                img.src = '';
                img.alt = '';
            }

            document.getElementById('fs-counter').textContent =
                String(currentSlide + 1).padStart(2, '0') + ' / ' + String(slideCount).padStart(2, '0');

            const totalSessions = COURSES[currentCourse].sessions.length;
            document.getElementById('fs-prev').disabled = currentSession === 0 && currentSlide === 0;
            document.getElementById('fs-next').disabled =
                currentSession === totalSessions - 1 && currentSlide === slideCount - 1;
        }

        function openFullscreen() {
            document.getElementById('fs-overlay').removeAttribute('hidden');
            document.body.style.overflow = 'hidden';
            fsUpdateImage();
        }

        function closeFullscreen() {
            document.getElementById('fs-overlay').setAttribute('hidden', '');
            document.body.style.overflow = '';
        }

        /* ============================================
           Slides JSON Loader
           각 step 폴더의 slides.json을 fetch하여
           COURSES 오브젝트의 slides 배열을 덮어씀.
           slides.json이 없으면 기존 배열 유지 (fallback).
           순서 변경 시 slides.json만 수정하면 됨.
           ============================================ */
        async function loadAllSlides() {
            const promises = [];
            for (const [courseName, course] of Object.entries(COURSES)) {
                for (const session of course.sessions) {
                    const stepFolder = 'step' + String(session.num).padStart(2, '0');
                    const url = 'assets/' + courseName + '/' + stepFolder + '/slides.json';
                    promises.push(
                        fetch(url)
                            .then(r => r.ok ? r.json() : null)
                            .then(data => { if (data && data.slides) session.slides = data.slides; })
                            .catch(() => {})
                    );
                }
            }
            await Promise.all(promises);
        }

        /* ============================================
           Init
           ============================================ */
        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllSlides();   // slides.json 로드 (순서/파일명 갱신)
            readHash();   // URL 해시에서 course/session/slide 복원
            renderSlides(currentCourse);
            applySlidePositions();           // 복원된 세션 위치 반영
            applyImageSlidePositions();      // 복원된 슬라이드 위치 반영
            renderDots(getSlideCount(COURSES[currentCourse].sessions[currentSession]));
            renderSidebar(currentCourse);
            updateIndicator();
            pushHash();   // 초기 상태를 URL에 반영

            // 전체화면 진입 버튼 이벤트 (renderSlides 후 등록)
            document.getElementById('slides-container').addEventListener('click', e => {
                if (e.target.closest('.image-expand-btn')) openFullscreen();
            });

            // 전체화면 오버레이 버튼
            document.getElementById('fs-prev').addEventListener('click', () => {
                goToSlide(-1);
                fsUpdateImage();
            });
            document.getElementById('fs-next').addEventListener('click', () => {
                goToSlide(1);
                fsUpdateImage();
            });
            document.getElementById('fs-close').addEventListener('click', closeFullscreen);

            // ESC로 종료
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape' && !document.getElementById('fs-overlay').hidden) {
                    closeFullscreen();
                }
            });
        });
    </script>

    <!-- 전체화면 슬라이드 오버레이 -->
    <div class="fs-overlay" id="fs-overlay" hidden>
        <button class="fs-nav prev" id="fs-prev">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <div class="fs-image-wrap">
            <img id="fs-img" src="" alt="">
        </div>
        <button class="fs-nav next" id="fs-next">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M7 4l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <div class="fs-ui">
            <span class="fs-counter" id="fs-counter"></span>
            <button class="fs-close" id="fs-close" title="닫기 (ESC)">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>
</body>
