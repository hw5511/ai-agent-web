<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacking Images - 014</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f5f0;
      height: 600vh;
      font-family: 'Space Mono', monospace;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
    }

    header span {
      font-size: 10px;
      font-weight: 400;
      color: #000;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #stage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      perspective: 800px;
    }

    #stack-container {
      position: relative;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .img-wrapper {
      position: absolute;
      width: 280px;
      height: 360px;
      opacity: 0;
      will-change: transform, opacity;
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      display: block;
    }

    .img-label {
      position: absolute;
      bottom: -18px;
      right: 0;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: #888;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #scroll-indicator {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }

    #scroll-text {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: #888;
      letter-spacing: 0.1em;
      text-align: center;
      transition: opacity 0.4s ease;
      white-space: nowrap;
    }

    #progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(0, 0, 0, 0.1);
      z-index: 100;
    }

    #progress-fill {
      height: 100%;
      background: #000;
      width: 0%;
    }
  </style>
</head>
<body>

  <header>
    <span>STACKING IMAGES</span>
    <span>014</span>
  </header>

  <div id="stage">
    <div id="stack-container"></div>
  </div>

  <div id="scroll-indicator">
    <div id="scroll-text">SCROLL</div>
  </div>

  <div id="progress-bar">
    <div id="progress-fill"></div>
  </div>

  <script>
    var IMAGE_DATA = [
      { seed: 10, rotate: -8,  tx: -120, ty: -40,  scale: 0.85 },
      { seed: 20, rotate:  5,  tx:  80,  ty: -80,  scale: 0.90 },
      { seed: 30, rotate: -3,  tx: -60,  ty:  60,  scale: 0.95 },
      { seed: 40, rotate: 10,  tx:  100, ty:  20,  scale: 0.88 },
      { seed: 50, rotate: -6,  tx: -30,  ty: -60,  scale: 0.92 },
      { seed: 60, rotate:  2,  tx:  40,  ty:  40,  scale: 1.00 },
    ];

    var container = document.getElementById('stack-container');
    var progressFill = document.getElementById('progress-fill');
    var scrollText = document.getElementById('scroll-text');

    var wrappers = [];

    IMAGE_DATA.forEach(function(data, i) {
      var wrapper = document.createElement('div');
      wrapper.className = 'img-wrapper';
      wrapper.style.zIndex = i + 1;
      wrapper.style.transform = buildTransform(data, 80);

      var img = document.createElement('img');
      img.src = 'https://picsum.photos/seed/' + data.seed + '/400/500';
      img.alt = '';

      var label = document.createElement('div');
      label.className = 'img-label';
      label.textContent = String(i + 1).padStart(2, '0');

      wrapper.appendChild(img);
      wrapper.appendChild(label);
      container.appendChild(wrapper);

      wrappers.push({ wrapper: wrapper, label: label, data: data });
    });

    function buildTransform(data, yOffset) {
      var tx = data.tx - 140;
      var ty = data.ty - 180 + (yOffset || 0);
      return (
        'translate(' + tx + 'px, ' + ty + 'px) ' +
        'rotate(' + data.rotate + 'deg) ' +
        'scale(' + data.scale + ')'
      );
    }

    var TOTAL = IMAGE_DATA.length;
    var STEP = 1 / TOTAL;
    var scrollTextState = 'SCROLL';
    var textTransitioning = false;

    function onScroll() {
      var scrollY = window.scrollY || document.documentElement.scrollTop;
      var maxScroll = document.body.scrollHeight - window.innerHeight;
      var progress = Math.min(scrollY / maxScroll, 1);

      progressFill.style.width = (progress * 100) + '%';

      wrappers.forEach(function(item, i) {
        var start = i * STEP;
        var end = start + STEP;

        if (progress < start) {
          item.wrapper.style.opacity = '0';
          item.wrapper.style.transform = buildTransform(item.data, 80);
          item.label.style.opacity = '0';
        } else {
          item.wrapper.style.opacity = '1';
          item.wrapper.style.transform = buildTransform(item.data, 0);
          item.label.style.opacity = '1';
        }
      });

      var allVisible = progress >= 0.95;

      if (allVisible && scrollTextState !== 'DRAG TO EXPLORE' && !textTransitioning) {
        textTransitioning = true;
        scrollText.style.opacity = '0';
        setTimeout(function() {
          scrollText.textContent = 'DRAG TO EXPLORE';
          scrollText.style.opacity = '1';
          scrollTextState = 'DRAG TO EXPLORE';
          textTransitioning = false;
        }, 400);
      } else if (!allVisible && scrollTextState !== 'SCROLL' && !textTransitioning) {
        textTransitioning = true;
        scrollText.style.opacity = '0';
        setTimeout(function() {
          scrollText.textContent = 'SCROLL';
          scrollText.style.opacity = '1';
          scrollTextState = 'SCROLL';
          textTransitioning = false;
        }, 400);
      }

      parallaxEnabled = allVisible;
    }

    var parallaxEnabled = false;
    var targetRX = 0;
    var targetRY = 0;
    var currentRX = 0;
    var currentRY = 0;

    document.addEventListener('mousemove', function(e) {
      if (!parallaxEnabled) return;
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      targetRY =  (e.clientX / vw - 0.5) * 10;
      targetRX = -(e.clientY / vh - 0.5) * 10;
    });

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function animateParallax() {
      var tx, ty;
      if (parallaxEnabled) {
        currentRX = lerp(currentRX, targetRX, 0.06);
        currentRY = lerp(currentRY, targetRY, 0.06);
      } else {
        currentRX = lerp(currentRX, 0, 0.06);
        currentRY = lerp(currentRY, 0, 0.06);
      }

      container.style.transform = 'rotateX(' + currentRX + 'deg) rotateY(' + currentRY + 'deg)';
      requestAnimationFrame(animateParallax);
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    animateParallax();
  </script>
</body>
</html>
