<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacking Images - 014</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f5f0;
      height: 600vh;
      font-family: 'Space Mono', monospace;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
    }

    header span {
      font-size: 10px;
      font-weight: 400;
      color: #000;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .scroll-indicator {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: #000;
      text-transform: uppercase;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .image-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
    }

    .img-card {
      position: absolute;
      width: 280px;
      height: 360px;
      border-radius: 4px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      opacity: 0;
      will-change: opacity, transform;
    }

    .img-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

  <header>
    <span>Stacking Images</span>
    <span>014</span>
  </header>

  <div class="image-container" id="imageContainer">
    <div class="img-card" id="img1">
      <img src="https://picsum.photos/seed/10/400/500" alt="">
    </div>
    <div class="img-card" id="img2">
      <img src="https://picsum.photos/seed/20/400/500" alt="">
    </div>
    <div class="img-card" id="img3">
      <img src="https://picsum.photos/seed/30/400/500" alt="">
    </div>
    <div class="img-card" id="img4">
      <img src="https://picsum.photos/seed/40/400/500" alt="">
    </div>
    <div class="img-card" id="img5">
      <img src="https://picsum.photos/seed/50/400/500" alt="">
    </div>
    <div class="img-card" id="img6">
      <img src="https://picsum.photos/seed/60/400/500" alt="">
    </div>
  </div>

  <div class="scroll-indicator" id="scrollIndicator">Scroll</div>

  <script>
    var images = [
      {
        el: document.getElementById('img1'),
        rotate: -8,
        tx: -120,
        ty: -40,
        scale: 0.85
      },
      {
        el: document.getElementById('img2'),
        rotate: 5,
        tx: 80,
        ty: -80,
        scale: 0.9
      },
      {
        el: document.getElementById('img3'),
        rotate: -3,
        tx: -60,
        ty: 60,
        scale: 0.95
      },
      {
        el: document.getElementById('img4'),
        rotate: 10,
        tx: 100,
        ty: 20,
        scale: 0.88
      },
      {
        el: document.getElementById('img5'),
        rotate: -6,
        tx: -30,
        ty: -60,
        scale: 0.92
      },
      {
        el: document.getElementById('img6'),
        rotate: 2,
        tx: 40,
        ty: 40,
        scale: 1.0
      }
    ];

    var scrollIndicator = document.getElementById('scrollIndicator');
    var entryOffset = 80;
    var segmentSize = 1 / 6;

    function setTransform(img, progress) {
      var tx = img.tx;
      var ty = img.ty + entryOffset * (1 - progress);
      var rotate = img.rotate;
      var scale = img.scale;
      img.el.style.transform =
        'translate(' + (tx - 140) + 'px, ' + (ty - 180) + 'px) ' +
        'rotate(' + rotate + 'deg) ' +
        'scale(' + scale + ')';
    }

    function setTransformFinal(img) {
      img.el.style.transform =
        'translate(' + (img.tx - 140) + 'px, ' + (img.ty - 180) + 'px) ' +
        'rotate(' + img.rotate + 'deg) ' +
        'scale(' + img.scale + ')';
    }

    images.forEach(function(img) {
      img.el.style.transition = 'opacity 0.5s ease, transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      setTransform(img, 0);
    });

    function onScroll() {
      var scrollTop = window.scrollY || document.documentElement.scrollTop;
      var maxScroll = document.body.scrollHeight - window.innerHeight;
      var globalProgress = scrollTop / maxScroll;

      images.forEach(function(img, i) {
        var start = i * segmentSize;
        var end = start + segmentSize;

        if (globalProgress < start) {
          img.el.style.opacity = '0';
          setTransform(img, 0);
        } else if (globalProgress >= end) {
          img.el.style.opacity = '1';
          setTransformFinal(img);
        } else {
          var localProgress = (globalProgress - start) / segmentSize;
          img.el.style.opacity = String(Math.min(localProgress * 2, 1));
          setTransform(img, localProgress);
        }
      });

      if (globalProgress > 0.05) {
        scrollIndicator.style.opacity = '0';
      } else {
        scrollIndicator.style.opacity = '1';
      }
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  </script>
</body>
</html>
